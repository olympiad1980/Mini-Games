<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Last Delivery</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#0a0806;overflow:hidden;touch-action:none;
    font-family:"SFMono-Regular",ui-monospace,"Roboto Mono",monospace;color:#e8d5b0;}
  #wrap{position:relative;width:100%;height:100dvh;height:100vh;}
  canvas{display:block;width:100%;height:100%;}
  #hud{position:absolute;top:0;left:0;right:0;padding:10px 12px;
    display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;pointer-events:none;z-index:10;}
  .chip{pointer-events:auto;font-size:11px;letter-spacing:1px;
    background:rgba(15,10,5,0.72);border:1px solid rgba(251,146,60,0.28);
    color:rgba(251,146,60,0.92);padding:7px 12px;border-radius:7px;
    cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;
    backdrop-filter:blur(6px);white-space:nowrap;transition:.12s;
    min-width:150px;text-align:center;}
  .chip:active{transform:scale(0.96);}
  .chip.on{background:rgba(251,146,60,0.18);border-color:rgba(251,146,60,0.8);color:#ffd9a0;}
  /* подложки типов рельефа */
  #btn-terr.t-plain {background:rgba(90,130,70,0.30);border-color:rgba(150,200,120,0.7);color:#d6ecc2;}
  #btn-terr.t-hills {background:rgba(200,120,50,0.30);border-color:rgba(255,170,90,0.7);color:#ffd9a0;}
  #btn-terr.t-cliffs{background:rgba(120,80,50,0.34);border-color:rgba(170,120,80,0.75);color:#e8c9a6;}
  #readout{position:absolute;left:12px;bottom:14px;z-index:10;font-size:11px;line-height:1.55;
    letter-spacing:.5px;color:rgba(232,213,176,0.6);background:rgba(15,10,5,0.55);
    padding:8px 12px;border-radius:7px;border:1px solid rgba(255,255,255,0.06);
    backdrop-filter:blur(4px);pointer-events:none;}
  #readout b{color:#fb923c;}
  #gas{position:absolute;right:18px;bottom:24px;z-index:10;width:118px;height:118px;border-radius:50%;
    background:rgba(25,18,10,0.6);border:2px solid rgba(255,255,255,0.9);backdrop-filter:blur(8px);
    display:flex;align-items:center;justify-content:center;font-size:13px;letter-spacing:3px;
    color:rgba(255,255,255,0.85);cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;
    box-shadow:0 4px 22px rgba(0,0,0,0.55);transition:.07s;}
  #gas.pressed{background:rgba(251,146,60,0.25);border-color:rgba(255,210,120,1);
    box-shadow:0 0 30px rgba(251,146,60,0.55);transform:scale(0.95);}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>
  <div id="hud">
    <div class="chip t-hills" id="btn-terr" style="display:none">РЕЛЬЕФ: ХОЛМЫ</div>
    <div class="chip" id="btn-regen" style="display:none">СЛУЧАЙНЫЙ ВЫБОР</div>
    <div class="chip" id="btn-pack" style="display:none">УКЛАДКА: ПИРАМИДКА</div>
    <div class="chip" id="btn-cage" style="display:none">ПРУТЬЯ: ОБЫЧНАЯ</div>
  </div>
  <div id="readout"></div>
  <div id="gas">GAS</div>
</div>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let W,H,GY;
function resize(){
  const dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth;H=window.innerHeight;
  cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);
  GY=H*0.55;rebuild();
}

// ════════ РЕЛЬЕФ ════════
const STEP=5;
let TERRAIN=[],TW=0,GOAL=6000,seed=12345,TERR_MODE='HILLS';   // 'PLAIN'|'HILLS'|'CLIFFS'
function rnd(){seed=(seed*9301+49297)%233280;return seed/233280;}
function rr(a,b){return a+(b-a)*rnd();}
const ss=t=>t*t*(3-2*t), easeOut=t=>1-Math.pow(1-t,2.2), easeIn=t=>Math.pow(t,2.2);
function makeFeats(mode){
  const U=H;let cy=0;const f=[];const cracks=[];
  const push=(type,w,dy,ex)=>{f.push({type,w,sy:cy,dy,...(ex||{})});cy+=dy;};
  // вспом. для регистрации декоративной щели в текущей точке x (заполним sx позже)
  const markCrack=(localList)=>localList.push({featIndex:f.length});
  push('FLAT',W*1.6,0);                              // стартовая площадка
  if(mode==='PLAIN'){
    const b=[
      ()=>{push('HILL',rr(2.2,3.0)*W,-rr(0.06,0.12)*U);push('HILL',rr(2.2,3.0)*W,rr(0.06,0.12)*U);},
      ()=>{push('ROLL',rr(1.4,2.0)*W,rr(-0.05,0.05)*U);},
      ()=>{push('FLAT',rr(1.0,1.8)*W,0);},
    ];
    for(let i=0;i<7;i++){b[rnd()*b.length|0]();push('FLAT',rr(0.4,0.8)*W,0);}
  } else if(mode==='HILLS'){
    const b=[
      ()=>{push('HILL',rr(1.5,2.2)*W,-rr(0.20,0.30)*U);push('PEAK_DN',rr(0.5,0.7)*W,rr(0.20,0.30)*U);},
      ()=>{push('VALLEY',rr(1.2,1.7)*W,0,{depth:rr(0.22,0.34)*U});},
      ()=>{push('PEAK_UP',rr(0.55,0.75)*W,-rr(0.22,0.32)*U);push('PEAK_DN',rr(0.55,0.75)*W,rr(0.22,0.32)*U);},
      ()=>{push('HILL',rr(1.6,2.4)*W,-rr(0.16,0.24)*U);push('HILL',rr(1.6,2.4)*W,rr(0.16,0.24)*U);},
      ()=>{push('ROLL',rr(1.0,1.5)*W,rr(-0.08,0.08)*U);},
    ];
    for(let i=0;i<7;i++){b[rnd()*b.length|0]();push('FLAT',rr(0.2,0.5)*W,0);}
  } else { // CLIFFS
    const b=[
      ()=>{push('PEAK_UP',rr(0.50,0.68)*W,-rr(0.30,0.44)*U);push('PEAK_DN',rr(0.50,0.68)*W,rr(0.30,0.44)*U);},
      ()=>{push('VALLEY',rr(0.70,0.95)*W,0,{depth:rr(0.24,0.36)*U});},
      ()=>{push('HILL',rr(0.55,0.8)*W,-rr(0.22,0.34)*U);push('HILL',rr(0.5,0.75)*W,rr(0.22,0.34)*U);},
      ()=>{push('PEAK_DN',rr(0.6,0.8)*W,rr(0.26,0.38)*U);push('PEAK_UP',rr(0.55,0.72)*W,-rr(0.34,0.46)*U);},
      ()=>{push('STEP',rr(0.32,0.46)*W,-rr(0.16,0.26)*U);},
    ];
    for(let i=0;i<11;i++){
      b[rnd()*b.length|0]();
      if(rnd()>0.6)push('FLAT',rr(0.1,0.22)*W,0);
    }
  }
  push('HILL',W*1.5,-cy);push('FLAT',W*0.9,0);
  let x=0;f.forEach(s=>{s.sx=x;x+=s.w;});TW=x;
  GOAL=Math.min(TW-W*2.5, 6000);   // дистанция до финиша Б (px); с запасом меньше длины карты
  return {feats:f};
}
function buildProfile(){
  const {feats}=makeFeats(TERR_MODE);
  TERRAIN=[];let fi=0;
  for(let px=0;px<=TW;px+=STEP){
    while(fi<feats.length-1&&px>=feats[fi].sx+feats[fi].w)fi++;
    const f=feats[fi],t=Math.min(1,(px-f.sx)/f.w);let y;
    switch(f.type){
      case'FLAT':y=f.sy;break;
      case'HILL':case'ROLL':case'STEP':y=f.sy+f.dy*ss(t);break;
      case'PEAK_UP':y=f.sy+f.dy*easeOut(t);break;
      case'PEAK_DN':y=f.sy+f.dy*easeIn(t);break;
      case'VALLEY':{
        const edge=0.30;let k;
        if(t<edge)k=ss(t/edge);else if(t>1-edge)k=ss((1-t)/edge);else k=1;
        y=f.sy+k*f.depth;break;
      }
      default:y=f.sy;
    }
    TERRAIN.push(y);   // ФИЗИКА: поверхность гладкая
  }
}
function rebuild(){seed=(Math.random()*99999)|0;buildProfile();scroll=0;speed=0;camY=null;bike.init=false;bike.airborne=false;bike.vy=0;parts.length=0;emit=0;wheelie=0;slip=0;forkTravel=0;forkVel=0;flapAng=0;flapVel=0;tapeBroken=false;cargo=CARGO_MAX;}
function terrY(worldX){
  const tw=TW;let x=((worldX%tw)+tw)%tw;
  const i=Math.floor(x/STEP),t=(x-i*STEP)/STEP,n=TERRAIN.length;
  return GY+TERRAIN[i%n]+(TERRAIN[(i+1)%n]-TERRAIN[i%n])*t;
}

// ════════ СОСТОЯНИЕ ИГРЫ (модель заезда: уровни-доставки) ════════
// READY → RIDING → DELIVERED | FAILED
let gameState='READY';
// ── груз: баллоны O₂, которые везём из А в Б ──
let cargo=0;            // сколько баллонов на байке сейчас
const CARGO_MAX=3;     // размер заказа — грузим столько на базе А
function setState(s){ gameState=s; }
function startRide(){ if(gameState==='READY'){ gameState='RIDING'; } }
function resetRide(){ gameState='READY'; rebuild(); }

// ════════ ФИЗИКА (жёсткая база) ════════
let scroll=0,speed=0,gasHeld=false,wheelAngF=0,wheelAngR=0,slip=0,wheelie=0,spinF=0,spinR=0;
let forkTravel=0, forkVel=0;     // визуальный ход задней подвески (пружина-демпфер)
let flapAng=0, flapVel=0;        // хлоп задней крышки сетки (петля у пика): угол + скорость
let tSec=0;                      // аккумулятор времени (для независимого дребезга прутьев)
// раскладки баллонов в клетке (для подбора вида; [x,y,поворот])
const PACK_LAYOUTS={
  PYRAMID:[[-40,-29.5,0.06],[-58,-29.0,-0.05],[-49,-41.0,0.02]],   // 2 внизу + 1 в ямке
  ROW:    [[-38,-29,0.05],[-52,-30,-0.04],[-66,-28.5,0.07]],       // ряд вразброс
  STAIRS: [[-36,-43,0.06],[-50,-35,0.10],[-64,-28,0.04]],          // лесенка-диагональ (подъём к переду)
  CROSS:  [[-42,-29,0.05],[-60,-29,-0.05],[-50,-42,0.9]]           // два вдоль + один поперёк
};
const PACK_ORDER=['PYRAMID','ROW','STAIRS','CROSS'];
const PACK_LABEL={PYRAMID:'ПИРАМИДКА',ROW:'РЯД',STAIRS:'ЛЕСЕНКА',CROSS:'ПОПЕРЁК'};
let packMode='PYRAMID';
// толщина прутьев клетки (кнопка): множитель к базовой ширине
const CAGE_STEPS=[1.0, 1.4, 1.8];
const CAGE_LABEL=['ОБЫЧНАЯ','ЖИРНАЯ','ОЧЕНЬ ЖИРНАЯ'];
let cageW=1;                     // индекс в CAGE_STEPS (1 = ЖИРНАЯ, зафиксировано)
const CW=()=>CAGE_STEPS[cageW];  // текущий множитель
let tapeBroken=false;            // ленточка финиша Б: порвана ли (рвётся при пересечении)
const CX=()=>W*0.38;
const HALF=48, WR=20;
const ENG=900, GRAV_ROLL=900, DRAG=1.5, SPD_MIN=-300, SPD_MAX=760, JUMP_MIN_SPD=70;
const JUMP_V=560, GRAV=1500, AIR_ANG=-0.16;   // прыжок: импульс вверх, гравитация, наклон в воздухе
const SLIP_THRESH=0.25, SLIP_GAIN=34, LAUNCH_SPD=220;   // буксование: порог склона, сила, скорость «схватывания»
const WHEELIE_MAX=0.22;                                  // подскок носа на старте (рад, ~13°)
// состояние байка (земля/воздух)
const bike={airborne:false, axleY:0, ang:0, vy:0, init:false};
// частицы из-под колеса (камни + пыль)
const parts=[]; let emit=0;
const rand=(a,b)=>a+Math.random()*(b-a);
function rigidSolve(cx,seedA){
  let a=seedA||0;
  for(let it=0;it<4;it++){
    const rx=cx-HALF*Math.cos(a),fx=cx+HALF*Math.cos(a);
    a=Math.atan2(terrY(scroll+fx)-terrY(scroll+rx),fx-rx);
  }
  const rx=cx-HALF*Math.cos(a),fx=cx+HALF*Math.cos(a);
  const gR=terrY(scroll+rx),gF=terrY(scroll+fx);
  const axleY=Math.min(gR-WR+HALF*Math.sin(a),gF-WR-HALF*Math.sin(a));
  return {a,axleY,gR,gF,rx,fx};
}
function updatePhysics(dt){
  const cx=CX();
  const s=rigidSolve(cx,bike.ang);     // как байк стоял бы на земле сейчас
  const groundAxleY=s.axleY, groundAng=s.a;
  if(!bike.init){bike.axleY=groundAxleY;bike.ang=groundAng;bike.init=true;}

  // ── продольная физика (только на земле) ──
  const eng = gasHeld && gameState==='RIDING';   // газ работает только во время заезда
  if(!bike.airborne){
    if(eng) speed += ENG*dt;                           // двигатель
    speed += GRAV_ROLL*Math.sin(groundAng)*dt;         // скатывание по склону (вниз +, вверх −)
    speed -= speed*DRAG*dt;                            // сопротивление качению (плавно к 0)
    speed = Math.max(SPD_MIN, Math.min(SPD_MAX, speed));
    if(!eng && Math.abs(speed)<6 && Math.abs(Math.sin(groundAng))<0.03) speed=0; // покой на ровном
  }
  // ── пробуксовка заднего колеса: старт с низкой скорости + крутой подъём ──
  let slipRate=0, wTarget=0;
  if(!bike.airborne && eng && speed>-5){
    const launch=Math.max(0,1-Math.abs(speed)/LAUNCH_SPD);                        // трогание с места / после остановки
    const steep =Math.max(0,(-Math.sin(groundAng)-SLIP_THRESH)/(1-SLIP_THRESH));  // крутой/затяжной подъём
    slipRate=SLIP_GAIN*Math.min(1.2, launch*0.9 + steep);
    wTarget=WHEELIE_MAX*launch;                                                   // подскок носа на старте
  }
  slip+=(slipRate-slip)*Math.min(1,12*dt);   // сглаживание
  wheelie+=(wTarget-wheelie)*Math.min(1,8*dt);
  scroll += speed*dt;
  spinF = speed/WR;                          // угловая скорость переднего (рад/с)
  spinR = speed/WR + slip;                   // заднего + букс
  wheelAngF += spinF*dt;                     // переднее — катится по скорости
  wheelAngR += spinR*dt;                     // заднее — + проскальзывание

  // ── вертикаль (земля/воздух) ──
  if(bike.airborne){
    bike.vy+=GRAV*dt;
    bike.axleY+=bike.vy*dt;
    bike.ang+=(AIR_ANG-bike.ang)*Math.min(1,4*dt);     // лёгкий нос вверх в полёте
    if(bike.vy>0 && bike.axleY>=groundAxleY){          // приземление
      const impact=bike.vy;
      bike.airborne=false;bike.axleY=groundAxleY;bike.vy=0;
      landingPuff(s.rx,s.gR,Math.min(1,impact/600));   // пыль/камни от удара
      forkVel += Math.min(300, impact*0.7);            // просадка заднего: толчок сжатия от удара
      flapVel -= Math.min(9, impact*0.022);            // удар подкидывает крышку сетки вверх
    }
  } else {
    bike.axleY=groundAxleY;
    bike.ang+=(groundAng-bike.ang)*Math.min(1,18*dt);  // быстрое следование рельефу
  }

  const a=bike.ang, axleY=bike.axleY;
  // ── ход задней подвески: пружина-демпфер к статике; толчок при приземлении ──
  forkVel += ((0-forkTravel)*260 - forkVel*16)*dt;
  forkTravel += forkVel*dt;
  forkTravel = Math.max(-8, Math.min(30, forkTravel));   // потолок просадки
  // ── хлоп задней крышки сетки: жёсткая пружина + сильный демпфер = металлич. дребезг ──
  // (крышка — единственный реально подвижный элемент; бьётся резко и быстро затухает)
  const shake = bike.airborne ? 0 : Math.abs(speed)*0.05*(0.6+slip*0.05);
  flapVel += ((0-flapAng)*420 - flapVel*7)*dt + (Math.random()-0.5)*shake*dt;
  flapAng += flapVel*dt;
  flapAng = Math.max(-0.805, Math.min(0.115, flapAng));  // амплитуда качания +15%
  tSec += dt;                                            // глобальное время для дребезга прутьев
  // ── вилли: пивот вокруг заднего колеса, переднее приподнимается ──
  const w=bike.airborne?0:wheelie;
  const aEff=a-w;                                   // нос вверх
  const rx=cx-HALF*Math.cos(a), ry=axleY-HALF*Math.sin(a);   // заднее колесо остаётся на месте
  const axCx=rx+HALF*Math.cos(aEff), axCy=ry+HALF*Math.sin(aEff);
  // заднее колесо смещается на величину хода подвески (пивот вилли остаётся жёстким — rx,ry)
  const upx=Math.sin(aEff), upy=-Math.cos(aEff);
  const rxd=rx+upx*forkTravel, ryd=ry+upy*forkTravel;
  return {cx:axCx,a:aEff,axleY:axCy,cy:axCy-16,
    rear:{x:rxd,y:ryd},
    front:{x:rx+2*HALF*Math.cos(aEff),y:ry+2*HALF*Math.sin(aEff)},
    gR:s.gR,gF:s.gF};
}
function jump(){ if(!bike.airborne && bike.init){ bike.airborne=true; bike.vy=-JUMP_V; } }

// ════════ ОТРИСОВКА БАЙКА ════════
function drawWheel(x,y,ang,spin){
  // spin — модуль угловой скорости (рад/с). Высокая → motion blur вместо чётких спиц.
  const blur=Math.min(1,Math.max(0,(Math.abs(spin)-7)/13));    // тает раньше: полный блюр уже к ~20 рад/с
  ctx.save();ctx.translate(x,y);
  // покрышка
  ctx.beginPath();ctx.arc(0,0,WR,0,7);ctx.lineWidth=8;ctx.strokeStyle='#181818';ctx.stroke();
  // грунтозацепы — чёткие на низкой скорости, тают в кольцо при блюре
  ctx.save();ctx.rotate(ang);ctx.strokeStyle='#0c0c0c';ctx.lineWidth=3;ctx.lineCap='round';
  ctx.globalAlpha=1-blur;
  for(let i=0;i<12;i++){const an=i/12*Math.PI*2;
    ctx.beginPath();ctx.moveTo(Math.cos(an)*(WR+1),Math.sin(an)*(WR+1));
    ctx.lineTo(Math.cos(an)*(WR+4),Math.sin(an)*(WR+4));ctx.stroke();}
  ctx.globalAlpha=1;ctx.lineCap='butt';ctx.restore();
  if(blur>0){ // смазанное кольцо протектора
    ctx.beginPath();ctx.arc(0,0,WR+2.5,0,7);ctx.lineWidth=3;ctx.strokeStyle='#0c0c0c';ctx.globalAlpha=blur*0.7;ctx.stroke();ctx.globalAlpha=1;
  }
  // обод
  ctx.beginPath();ctx.arc(0,0,WR*0.52,0,7);ctx.lineWidth=2.5;ctx.strokeStyle='#9c6234';ctx.stroke();
  // спицы — чёткие, либо размытый веер
  if(blur<1){
    ctx.save();ctx.rotate(ang);ctx.strokeStyle='#6a655a';ctx.lineWidth=1.3;ctx.globalAlpha=1-blur;
    for(let s=0;s<8;s++){const an=s/8*Math.PI*2;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(an)*(WR*0.5-1),Math.sin(an)*(WR*0.5-1));ctx.stroke();}
    ctx.globalAlpha=1;ctx.restore();
  }
  if(blur>0){ // радиальные размытые дуги (motion blur спиц)
    ctx.save();ctx.rotate(ang);ctx.strokeStyle='#6a655a';ctx.globalAlpha=blur*0.5;ctx.lineWidth=1.1;
    for(let s=0;s<8;s++){const a0=s/8*Math.PI*2;ctx.beginPath();ctx.arc(0,0,WR*0.34,a0,a0+0.7);ctx.stroke();}
    ctx.globalAlpha=1;ctx.restore();
  }
  ctx.fillStyle='#2a2620';ctx.beginPath();ctx.arc(0,0,3.2,0,7);ctx.fill();
  ctx.restore();
}
function spring(a,b,col){
  const dx=b.x-a.x,dy=b.y-a.y,len=Math.hypot(dx,dy)||1,px=-dy/len,py=dx/len,coils=6,amp=3.2;
  ctx.strokeStyle=col;ctx.lineWidth=2.4;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(a.x,a.y);
  for(let i=0;i<=coils;i++){const t=i/coils,x=a.x+dx*t,y=a.y+dy*t,s=(i%2?1:-1)*amp;ctx.lineTo(x+px*s,y+py*s);}
  ctx.lineTo(b.x,b.y);ctx.stroke();ctx.lineCap='butt';
}
function fork(t,b){
  const dx=b.x-t.x,dy=b.y-t.y;ctx.lineCap='round';
  ctx.strokeStyle='#4f2c14';ctx.lineWidth=7;
  ctx.beginPath();ctx.moveTo(t.x,t.y);ctx.lineTo(t.x+dx*0.55,t.y+dy*0.55);ctx.stroke();
  ctx.strokeStyle='#9c6234';ctx.lineWidth=4.5;
  ctx.beginPath();ctx.moveTo(t.x+dx*0.45,t.y+dy*0.45);ctx.lineTo(b.x,b.y);ctx.stroke();
  ctx.lineCap='butt';
}
// каркас рисуется в ЛОКАЛЬНОЙ системе байка: ось (cx,axleY), колёса в (±HALF,0)
// ржавая палитра байка (один источник правды — легко менять при апгрейдах)
const RUST={
  steel:'#7a4622', steelLt:'#9c6234', steelDk:'#4f2c14',
  frame:'#8a4a1e', engine:'#3a2c20', engineDk:'#241a12', engineHi:'#5a3a22',
  tank:'#9a5a2c', tankHi:'#c07a40', seat:'#241a14', seatHi:'#3a281c',
  pipe:'#8a5a32', pipeHi:'#a8743f', bar:'#2a1c12', spring:'#c98a3a'
};
function drawFrame(cx,axleY,a){
  ctx.save();ctx.translate(cx,axleY);ctx.rotate(a);
  const LIFT=16; ctx.translate(0,-LIFT);            // приподнять корпус над колёсами (клиренс)
  const RAX={x:-HALF,y:LIFT-forkTravel}, FAX={x:HALF,y:LIFT};  // ход на заднем колесе
  const pivot={x:-8,y:-4}, head={x:26,y:-38};   // шарнир маятника / голова рамы (верх вилки)

  // ── задний горизонтальный глушитель (торчит назад) ──
  ctx.fillStyle=RUST.pipeHi;ctx.beginPath();ctx.roundRect(-62,-22,30,9,4);ctx.fill();
  ctx.fillStyle=RUST.steelDk;ctx.beginPath();ctx.roundRect(-34,-21,6,7,2);ctx.fill();
  ctx.fillStyle=RUST.steelDk;ctx.beginPath();ctx.ellipse(-62,-17.5,2.5,4,0,0,7);ctx.fill();

  // ── маятник (тонкий, почти горизонтальный) + цепь ──
  ctx.lineCap='round';
  ctx.strokeStyle=RUST.steelLt;ctx.lineWidth=6;
  ctx.beginPath();ctx.moveTo(pivot.x,pivot.y);ctx.lineTo(RAX.x,RAX.y);ctx.stroke();
  ctx.strokeStyle=RUST.engineDk;ctx.lineWidth=1.6;
  ctx.beginPath();ctx.moveTo(pivot.x,pivot.y+5);ctx.lineTo(RAX.x,RAX.y+3);ctx.stroke();
  ctx.lineCap='butt';

  // ── задний амортизатор ──
  spring({x:-12,y:-32},{x:-28,y:4},RUST.spring);

  // ── выхлоп: изгиб из головы движка вниз и назад к глушителю ──
  ctx.lineCap='round';ctx.strokeStyle=RUST.pipe;ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(12,-14);ctx.quadraticCurveTo(16,4,-6,3);
  ctx.quadraticCurveTo(-28,2,-40,-14);ctx.stroke();ctx.lineCap='butt';

  // ── РАМА: тонкий трелис (видно насквозь) ──
  ctx.strokeStyle=RUST.frame;ctx.lineWidth=3.4;ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(head.x,head.y);ctx.lineTo(2,-33);ctx.stroke();        // хребет
  ctx.beginPath();ctx.moveTo(head.x,head.y);ctx.lineTo(13,-4);ctx.stroke();        // передняя труба к движку
  ctx.beginPath();ctx.moveTo(13,-4);ctx.lineTo(pivot.x,pivot.y);ctx.stroke();      // нижний рейл
  ctx.beginPath();ctx.moveTo(2,-33);ctx.lineTo(-34,-30);ctx.stroke();             // подрама
  ctx.beginPath();ctx.moveTo(-10,-31);ctx.lineTo(pivot.x,pivot.y);ctx.stroke();    // косынка к шарниру
  ctx.beginPath();ctx.moveTo(2,-33);ctx.lineTo(8,-6);ctx.stroke();                // средняя стойка

  // ── двигатель (одноцилиндровый thumper) ──
  ctx.fillStyle=RUST.engine;ctx.beginPath();ctx.roundRect(-6,-16,24,18,3);ctx.fill();
  ctx.fillStyle=RUST.engineDk;for(let i=0;i<5;i++)ctx.fillRect(0+i*4,-22,2.4,8); // рёбра головки
  ctx.fillStyle=RUST.engineDk;ctx.beginPath();ctx.roundRect(2,-24,12,4,2);ctx.fill();
  ctx.fillStyle=RUST.engineHi;ctx.beginPath();ctx.arc(8,-4,7.5,0,7);ctx.fill();   // картер сцепления
  ctx.fillStyle=RUST.engineDk;ctx.beginPath();ctx.arc(8,-4,3,0,7);ctx.fill();

  // ── округлый бак (ржавый металл, высоко за рулём) ──
  ctx.fillStyle=RUST.tank;ctx.beginPath();
  ctx.moveTo(2,-31);
  ctx.quadraticCurveTo(2,-44,14,-45);
  ctx.quadraticCurveTo(24,-45,23,-35);
  ctx.quadraticCurveTo(22,-31,14,-31);
  ctx.closePath();ctx.fill();
  ctx.fillStyle=RUST.tankHi;ctx.beginPath();ctx.ellipse(12,-41,6,2.4,-0.2,0,7);ctx.fill(); // блик
  ctx.fillStyle=RUST.steelDk;ctx.beginPath();ctx.arc(20,-34,1.6,0,7);ctx.fill();            // крышка

  // ── длинное плоское седло (тонкое) ──
  ctx.fillStyle=RUST.seat;ctx.beginPath();
  ctx.moveTo(0,-33);ctx.lineTo(-32,-32);ctx.quadraticCurveTo(-38,-32,-38,-29);
  ctx.lineTo(-2,-30);ctx.closePath();ctx.fill();
  ctx.fillStyle=RUST.seatHi;ctx.fillRect(-30,-32,24,1.4);

  // ── СЕТКА ПОД БАЛЛОНЫ (кривой самосварной каркас по эскизу; за седлом, над колесом) ──
  {
    // неровные углы; задний торец уехал назад (за выхлоп, который кончается ≈-62)
    const FB=[-26,-25], FT=[-28,-47], RB=[-78,-22];
    const APEX=[-38,-57];                                 // ВЕРШИНА угла (~44.5°, +15%) — статична, петля тут
    const HINGE=APEX;                                     // крышка крепится к вершине
    const RTrest=[-80,-49];                              // покой: длинная грань идёт назад-вниз от вершины
    const ca=Math.cos(flapAng), sa=Math.sin(flapAng);
    const dxr=RTrest[0]-HINGE[0], dyr=RTrest[1]-HINGE[1];
    const RT=[HINGE[0]+dxr*ca-dyr*sa, HINGE[1]+dxr*sa+dyr*ca];  // длинная часть качается вокруг вершины
    const lerp=(a,b,t)=>[a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t];
    const mv=p=>ctx.lineTo(p[0],p[1]);
    // нижний горизонтальный прут длиннее низа на 12% (выступает назад)
    const RBlong=[FB[0]+(RB[0]-FB[0])*1.12, RB[1]];

    ctx.lineCap='round';ctx.lineJoin='round';

    // ── БАЛЛОНЫ O₂ в клетке (серый ржавый металл, лёжа на боку, с краником) ──
    // пробная раскладка: 2 внизу + 1 сверху в ямке; без физики
    const drawTank=(cxT,cyT,rot)=>{
      ctx.save();ctx.translate(cxT,cyT);ctx.rotate(rot);
      const L=31, R=7.4;                                  // крупный баллон лёжа (+20%)
      // корпус — грязно-серый металл с бурым подтоном (не новый)
      ctx.fillStyle='#827d74';ctx.beginPath();ctx.roundRect(-L/2,-R,L,R*2,R);ctx.fill();
      ctx.fillStyle='rgba(58,42,28,0.28)';                // бурая грязь по низу
      ctx.beginPath();ctx.roundRect(-L/2,R*0.0,L,R,R*0.7);ctx.fill();
      ctx.fillStyle='rgba(0,0,0,0.22)';                   // нижняя объёмная тень
      ctx.beginPath();ctx.roundRect(-L/2,R*0.45,L,R*0.55,R*0.5);ctx.fill();
      ctx.fillStyle='rgba(245,242,236,0.14)';             // верхний продольный блик
      ctx.fillRect(-L/2+R,-R+1.6,L-R*1.7,1.6);
      ctx.fillStyle='#6e6960';ctx.beginPath();ctx.ellipse(-L/2+2,0,2,R*0.9,0,0,7);ctx.fill(); // дно-купол слева
      // «пиптик» сверху с краником (горловина-вентиль, торчит вверх) — читаемый
      const nx=L*0.28;
      ctx.fillStyle='#56524b';ctx.fillRect(nx-1.6,-R-3.5,3.2,4);  // шейка пиптика
      ctx.fillStyle='#6a5230';ctx.fillRect(nx-2.8,-R-5.8,5.6,2.6);// краник (латунный маховик)
      ctx.fillStyle='#3a2c18';ctx.fillRect(nx-0.7,-R-5.8,1.4,2.6);// ось краника
      ctx.restore();
    };
    // раскладки на выбор (кнопка УКЛАДКА): [x, y, поворот]
    PACK_LAYOUTS[packMode].forEach(t=>drawTank(t[0],t[1],t[2]));

    // — опоры вниз к раме/оси —
    ctx.strokeStyle=RUST.steelDk;ctx.lineWidth=3.2*CW();
    ctx.beginPath();
    ctx.moveTo(FB[0],FB[1]);ctx.lineTo(-30,-9);          // передняя опора → подрама
    ctx.moveTo(RB[0],RB[1]);ctx.lineTo(-54,-5);          // задняя опора → задняя ось
    ctx.moveTo(RB[0]+2,RB[1]);ctx.lineTo(FB[0]-2,-12);ctx.stroke(); // косой раскос
    // — нижний прут (длиннее на 12%) —
    ctx.strokeStyle=RUST.steel;ctx.lineWidth=3.2*CW();
    ctx.beginPath();ctx.moveTo(FB[0],FB[1]);ctx.lineTo(RBlong[0],RBlong[1]);ctx.stroke();
    // — контур: зад→FB→FT→вершина (передний скос FT→APEX ~35° НЕПОДВИЖЕН) —
    ctx.beginPath();ctx.moveTo(RB[0],RB[1]);mv(FB);mv(FT);mv(APEX);ctx.stroke();
    // — БОЛТАЮЩАЯСЯ длинная грань: вершина APEX → задний конец RT —
    ctx.strokeStyle=RUST.steel;ctx.lineWidth=3.2*CW();
    ctx.beginPath();ctx.moveTo(HINGE[0],HINGE[1]);ctx.lineTo(RT[0],RT[1]);ctx.stroke();
    ctx.strokeStyle=RUST.steelLt;ctx.lineWidth=1.1;     // блик на грани и переднем скосе
    ctx.beginPath();ctx.moveTo(HINGE[0],HINGE[1]);ctx.lineTo(RT[0],RT[1]);ctx.moveTo(FT[0],FT[1]);mv(APEX);ctx.stroke();
    // — 2 горизонт. перегородки: ФИКСИРОВАНЫ, удлинены вправо на 20%, мелкий дребезг вразнобой —
    const RTfix=[-80,-47];                               // статичный задний верх (не качается)
    const jit = bike.airborne ? 0.15 : (0.4+Math.min(1,Math.abs(speed)/120));
    ctx.strokeStyle=RUST.steel;ctx.lineWidth=3.2*CW();
    [{t:0.40, f:23, ph:0.0, amp:0.575},
     {t:0.72, f:17, ph:1.7, amp:0.92}].forEach(s=>{
      const a0=lerp(RB,RTfix,s.t), b=lerp(FB,FT,s.t);
      const a=[b[0]+(a0[0]-b[0])*1.20, b[1]+(a0[1]-b[1])*1.20];   // +20% длины вправо (назад)
      const wob = Math.sin(tSec*s.f + s.ph)*s.amp*jit;
      ctx.beginPath();ctx.moveTo(a[0],a[1]+wob);ctx.lineTo(b[0],b[1]+wob*0.25);ctx.stroke();
    });
    ctx.lineCap='butt';ctx.lineJoin='miter';
    // — заклёпки по узлам; петля (вершина) выделена —
    ctx.fillStyle=RUST.engineDk;
    [FB,FT,RB].forEach(([x,y])=>{ctx.beginPath();ctx.arc(x,y,1.5,0,7);ctx.fill();});
    ctx.fillStyle=RUST.steelLt;ctx.beginPath();ctx.arc(HINGE[0],HINGE[1],1.8,0,7);ctx.fill();
  }




  // ── ВИЛКА (длинная, раскатанная) + тройник + руль ──
  fork(head,FAX);
  ctx.fillStyle=RUST.engine;ctx.save();ctx.translate(head.x,head.y);ctx.rotate(0.5);
  ctx.fillRect(-6,-4,13,9);ctx.restore();                                          // тройник вдоль вилки
  ctx.strokeStyle=RUST.bar;ctx.lineWidth=3.2;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(head.x,head.y-1);ctx.lineTo(head.x-10,head.y-12);ctx.stroke();   // руль
  ctx.beginPath();ctx.moveTo(head.x-10,head.y-12);ctx.lineTo(head.x-17,head.y-11);ctx.stroke(); // грип
  ctx.lineCap='butt';

  ctx.restore();
}
function drawBike(p){
  drawWheel(p.rear.x,p.rear.y,wheelAngR,spinR);
  drawWheel(p.front.x,p.front.y,wheelAngF,spinF);
  drawFrame(p.cx,p.axleY,p.a);
}

// ════════ ФОН + ЗЕМЛЯ ════════
function drawSky(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#3a3250');g.addColorStop(0.45,'#6a4a52');
  g.addColorStop(0.7,'#c66a32');g.addColorStop(1,'#e8a040');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}
function drawGround(){
  const BOT=8000;
  const pts=[];for(let sx=-STEP;sx<=W+STEP;sx+=STEP)pts.push({x:sx,y:terrY(scroll+sx)});
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(W,BOT);ctx.lineTo(0,BOT);ctx.closePath();ctx.fillStyle='#6e4a22';ctx.fill();
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y+18);pts.forEach(p=>ctx.lineTo(p.x,p.y+18));
  ctx.lineTo(W,BOT);ctx.lineTo(0,BOT);ctx.closePath();ctx.fillStyle='#3a2614';ctx.fill();
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineWidth=4;ctx.strokeStyle='#8a5a2a';ctx.stroke();
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineWidth=1.5;ctx.strokeStyle='rgba(255,150,40,0.5)';ctx.stroke();
  drawBaseA();
  drawFinish();
}
function drawFinish(){
  const fx=GOAL-scroll;                       // экранный X финиша
  if(fx<-60||fx>W+60)return;
  const fy=terrY(GOAL);
  const H1=72;                                // высота стоек
  // две стойки финишных ворот
  ctx.fillStyle='#2a2018';
  ctx.fillRect(fx-3,fy-H1,6,H1); ctx.fillRect(fx+30-3,fy-H1,6,H1);
  ctx.fillStyle='#3a2c1e';
  ctx.fillRect(fx-3,fy-H1,6,4); ctx.fillRect(fx+30-3,fy-H1,6,4);
  // ── ЛЕНТОЧКА-ФИНИШ (поперёк ворот, на высоте груди байка) ──
  const ty=fy-30, x0=fx, x1=fx+30;
  if(!tapeBroken){
    // целая: натянутая лента с лёгкой провисью
    ctx.strokeStyle='#e23c3c';ctx.lineWidth=4;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(x0,ty);ctx.quadraticCurveTo((x0+x1)/2,ty+3,x1,ty);ctx.stroke();
    ctx.strokeStyle='#ff7a6a';ctx.lineWidth=1.4;          // блик
    ctx.beginPath();ctx.moveTo(x0,ty-1);ctx.quadraticCurveTo((x0+x1)/2,ty+2,x1,ty-1);ctx.stroke();
    ctx.lineCap='butt';
  } else {
    // порвана: два свисающих обрывка от стоек
    ctx.strokeStyle='#e23c3c';ctx.lineWidth=4;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(x0,ty);ctx.quadraticCurveTo(x0+4,ty+10,x0+2,ty+20);ctx.stroke();   // левый обрывок
    ctx.beginPath();ctx.moveTo(x1,ty);ctx.quadraticCurveTo(x1-5,ty+9,x1-3,ty+18);ctx.stroke();    // правый обрывок
    ctx.lineCap='butt';
  }
}
// ════════ СТАРТ — одиночный красный флажок (на линии старта байка) ════════
const START_X = ()=> W - 90;                // мировой X флажка на старте: ближе к правому краю, но не вплотную
function drawBaseA(){
  const sxw = START_X();
  const fx = sxw - scroll;                   // экранный X (мир − скролл, как финиш)
  if(fx<-40||fx>W+40) return;
  const gy = terrY(sxw);
  // узкий длинный красный флажок: тонкий шест + вытянутый треугольный вымпел
  ctx.strokeStyle='#cfcfcf';ctx.lineWidth=2;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(fx,gy);ctx.lineTo(fx,gy-92);ctx.stroke();ctx.lineCap='butt'; // шест
  ctx.fillStyle='#7a7a7a';ctx.beginPath();ctx.arc(fx,gy-92,2.4,0,7);ctx.fill();           // навершие
  ctx.fillStyle='#e23c3c';                  // вымпел
  ctx.beginPath();ctx.moveTo(fx+1,gy-92);ctx.lineTo(fx+30,gy-84);ctx.lineTo(fx+1,gy-76);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.18)';   // блик
  ctx.beginPath();ctx.moveTo(fx+1,gy-92);ctx.lineTo(fx+16,gy-88.5);ctx.lineTo(fx+1,gy-85);ctx.closePath();ctx.fill();
}

function landingPuff(x,y,power){
  const n=6+Math.floor(power*12);
  for(let i=0;i<n;i++){
    if(Math.random()<0.6) parts.push({k:'d',x:x+rand(-12,12),y:y-4,vx:rand(-70,70),vy:rand(-130,-30),life:0,max:rand(0.5,0.95),size:rand(6,13)});
    else parts.push({k:'r',x:x+rand(-7,7),y:y-3,vx:rand(-180,180),vy:rand(-280,-90),life:0,max:rand(0.4,0.7),size:rand(2,4.2),col:Math.random()<0.5?'#4a3018':'#5a4226'});
  }
}
// ════════ ЧАСТИЦЫ ИЗ-ПОД КОЛЕСА ════════
function spawnSlip(p,dt){
  if(slip<2)return;
  emit+=slip*dt*3.4;                        // намного гуще
  const cxr=p.rear.x, cyr=p.gR;             // контакт заднего колеса с землёй
  while(emit>=1 && parts.length<700){ emit--;
    if(Math.random()<0.6){ // камень — мощный выброс ВВЕРХ из-под колеса
      parts.push({k:'r',x:cxr+rand(-5,3),y:cyr-9,vx:rand(-250,-30),vy:rand(-600,-320),life:0,max:rand(0.55,1.0),size:rand(2.2,4.8),col:Math.random()<0.5?'#4a3018':'#5a4226'});
    } else { // пыль — плотное облако, поднимается
      parts.push({k:'d',x:cxr+rand(-9,4),y:cyr-8,vx:rand(-100,-10),vy:rand(-280,-90),life:0,max:rand(0.6,1.1),size:rand(6,14)});
    }
  }
}
function updateDrawParts(dt){
  for(let i=parts.length-1;i>=0;i--){const o=parts[i];
    o.life+=dt; if(o.life>=o.max){parts.splice(i,1);continue;}
    o.vy+=820*dt;                          // гравитация
    o.x+=(o.vx-speed)*dt;                  // мир уезжает влево на скорость байка
    o.y+=o.vy*dt;
    if(o.k==='r' && o.vy>0 && o.y>terrY(scroll+o.x)){ parts.splice(i,1); continue; }
    const t=o.life/o.max;
    if(o.k==='r'){
      ctx.fillStyle=o.col;ctx.globalAlpha=1-t*0.45;
      const s=o.size*(1-t*0.18);
      ctx.fillRect(o.x-s/2,o.y-s/2,s,s);
    } else {
      ctx.fillStyle='#9a7a4a';ctx.globalAlpha=0.40*(1-t);
      ctx.beginPath();ctx.arc(o.x,o.y,o.size*(1+t*1.8),0,7);ctx.fill();
    }
  }
  ctx.globalAlpha=1;
}

// ════════ ЦИКЛ + КАМЕРА ════════
let camY=null,last=performance.now();
function loop(now){
  const dt=Math.min((now-last)/1000,0.033);last=now;
  const p=updatePhysics(dt);
  // финиш Б: байк доехал до целевой дистанции
  if(scroll+CX() >= GOAL) tapeBroken=true;            // ленточка рвётся при пересечении
  if(gameState==='RIDING' && scroll+CX() >= GOAL){ setState('DELIVERED'); }
  const targetCam=p.cy-H*0.52;
  if(camY===null)camY=targetCam;
  camY+=(targetCam-camY)*Math.min(1,7*dt);
  ctx.clearRect(0,0,W,H);drawSky();
  ctx.save();ctx.translate(0,-camY);
  drawGround();
  spawnSlip(p,dt); updateDrawParts(dt);     // камни/пыль под задним колесом
  drawBike(p);
  ctx.restore();
  const deg=(p.a*180/Math.PI).toFixed(1);
  const ST={READY:'база А — жми ГАЗ',RIDING:'ЗАЕЗД',DELIVERED:'ДОСТАВЛЕНО ✓',FAILED:'ПРОВАЛ ✗'}[gameState];
  const remain=Math.max(0,Math.round((GOAL-(scroll+CX()))/10));
  document.getElementById('readout').innerHTML=
    `рельеф: <b>${TERR_INFO[TERR_MODE].label}</b> · наклон: <b>${deg}°</b>`+
    `<br>скорость: <b>${Math.round(speed)}</b> · до Б: <b>${remain}</b> m · груз: <b>${cargo}/${CARGO_MAX}</b>`+
    `<br>статус: <b>${ST}</b>`+
    (slip>0.5?` · букс: <b>${slip.toFixed(0)}</b>`:'');
  requestAnimationFrame(loop);
}

// ════════ УПРАВЛЕНИЕ: GAS — держать=газ, короткий тап=прыжок ════════
const gas=document.getElementById('gas');
const TAP_MS=200;
let pressT=0, pressed=false, speedAtDown=0;
function down(){ if(pressed)return; pressed=true; gasHeld=true; pressT=performance.now(); speedAtDown=speed; gas.classList.add('pressed');
  if(gameState==='READY') startRide();              // первый зажим газа = старт заезда
}
function up(){ if(!pressed)return; pressed=false; gasHeld=false; gas.classList.remove('pressed');
  // короткое нажатие + байк уже ехал = прыжок (с места не прыгаем), только во время заезда
  if(gameState==='RIDING' && performance.now()-pressT < TAP_MS && speedAtDown > JUMP_MIN_SPD) jump();
}
['touchstart','mousedown'].forEach(e=>gas.addEventListener(e,ev=>{ev.preventDefault();down();},{passive:false}));
['touchend','touchcancel','mouseup','mouseleave'].forEach(e=>gas.addEventListener(e,ev=>{ev.preventDefault();up();},{passive:false}));
window.addEventListener('keydown',e=>{if((e.code==='Space'||e.code==='ArrowRight')&&!e.repeat)down();});
window.addEventListener('keyup',e=>{if(e.code==='Space'||e.code==='ArrowRight')up();});
const bT=document.getElementById('btn-terr'),bR=document.getElementById('btn-regen');
const TERR_INFO={PLAIN:{label:'РАВНИНА',cls:'t-plain'},HILLS:{label:'ХОЛМЫ',cls:'t-hills'},CLIFFS:{label:'СКАЛЫ-ОБРЫВЫ',cls:'t-cliffs'}};
const TERR_ORDER=['PLAIN','HILLS','CLIFFS'];
function applyTerrUI(){
  const info=TERR_INFO[TERR_MODE];
  bT.textContent='РЕЛЬЕФ: '+info.label;
  bT.classList.remove('t-plain','t-hills','t-cliffs');bT.classList.add(info.cls);
}
bT.onclick=()=>{ TERR_MODE=TERR_ORDER[(TERR_ORDER.indexOf(TERR_MODE)+1)%3]; applyTerrUI(); resetRide(); };
bR.onclick=()=>resetRide();
const bP=document.getElementById('btn-pack');
bP.onclick=()=>{ packMode=PACK_ORDER[(PACK_ORDER.indexOf(packMode)+1)%PACK_ORDER.length]; bP.textContent='УКЛАДКА: '+PACK_LABEL[packMode]; };
const bC=document.getElementById('btn-cage');
bC.onclick=()=>{ cageW=(cageW+1)%CAGE_STEPS.length; bC.textContent='ПРУТЬЯ: '+CAGE_LABEL[cageW]; };
applyTerrUI();
window.addEventListener('resize',resize);
resize();requestAnimationFrame(loop);
</script>
