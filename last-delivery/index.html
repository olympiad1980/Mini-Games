<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Last Delivery — v1.0</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#050505; overflow:hidden; touch-action:none; font-family:monospace; }
  #app { display:flex; flex-direction:column; width:100%; height:100dvh; height:100vh; }
  #game-container { flex:1; min-height:0; overflow:hidden; position:relative; }
  #game-container canvas { display:block; width:100%!important; height:100%!important; }
  #capsules-bar { display:none; }

  /* ── Панель управления — минимальная высота, кнопки выезжают вверх ── */
  #controls {
    flex-shrink:0;
    height:90px;
    background:#080808;
    border-top:1px solid #2a1a08;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    padding:0 18px;
    padding-bottom:max(4px,env(safe-area-inset-bottom));
    overflow:visible;       /* кнопки выходят за верхний край */
    position:relative;
    z-index:20;
  }

  #speedo-wrap {
    display:flex; flex-direction:column; align-items:center; gap:1px;
    margin-top:-38px;       /* спидометр поднят над панелью */
  }
  #dist-val { font-size:9px; color:#2a1a08; letter-spacing:2px; text-align:center; margin-top:2px; }
  #btn-group { display:flex; align-items:flex-end; gap:12px; margin-top:0; }

  /* ── GAS — крупный, выезжает вверх ── */
  #btn-gas {
    width:130px; height:130px; border-radius:50%;
    background:rgba(25,18,10,0.65);
    border:2px solid rgba(255,255,255,0.92);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    cursor:pointer; -webkit-tap-highlight-color:transparent; user-select:none;
    display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
    transition:background .07s,box-shadow .07s,transform .05s;
    flex-shrink:0;
    margin-top:-58px;       /* сильно выезжает вверх, почти к дороге */
    box-shadow:0 4px 24px rgba(0,0,0,0.6);
  }
  #btn-gas::before {
    content:''; position:absolute; inset:0; border-radius:50%;
    background:radial-gradient(circle at 38% 32%, rgba(255,255,255,0.14) 0%, transparent 60%);
    pointer-events:none;
  }
  #btn-gas.pressed {
    background:rgba(251,146,60,0.25);
    box-shadow:0 0 32px rgba(251,146,60,0.6),inset 0 0 16px rgba(251,146,60,0.14);
    transform:scale(0.95); border-color:rgba(255,210,120,1);
  }
  #btn-gas svg { width:68px; height:68px; }

  /* ── NITRO — заморожен, но ВИДИМЫЙ ── */
  #btn-nitro {
    width:58px; height:58px; border-radius:50%;
    background:rgba(20,22,20,0.75);
    border:2px solid rgba(100,120,100,0.55);
    backdrop-filter:blur(8px);
    display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
    flex-shrink:0;
    pointer-events:none;
    cursor:default;
    margin-top:-18px;
    box-shadow:0 2px 12px rgba(0,0,0,0.5), inset 0 0 10px rgba(40,50,40,0.3);
  }
  #btn-nitro::before { display:none; }
  #btn-nitro::after {
    content:''; position:absolute; inset:3px; border-radius:50%;
    background:rgba(12,15,12,0.88); pointer-events:none;
  }
  #nitro-icon {
    position:relative; z-index:2; font-size:22px; line-height:1;
    opacity:0.55;           /* значительно ярче — видно что есть */
    pointer-events:none;
    filter:grayscale(0.6) brightness(0.8);
  }
  /* Все анимации нитро отключены пока не реализована логика */
  #btn-nitro.ready,#btn-nitro.active { box-shadow:0 2px 12px rgba(0,0,0,0.5); animation:none; border-color:rgba(100,120,100,0.55); background:rgba(20,22,20,0.75); }
  #btn-nitro.ready #nitro-icon,#btn-nitro.active #nitro-icon { filter:grayscale(0.6) brightness(0.8); opacity:0.55; animation:none; }

  /* ── Тёмный фон под UI элементами — 36% снизу игровой зоны ── */
  #ui-bg {
    position:absolute;
    bottom:0; left:0; right:0;
    height:36%;
    background:linear-gradient(
      to bottom,
      rgba(4,3,2,0) 0%,
      rgba(4,3,2,0.55) 30%,
      rgba(4,3,2,0.88) 70%,
      rgba(4,3,2,0.97) 100%
    );
    pointer-events:none;
    z-index:8;
  }
</head>
<body>
<div id="app">
  <div id="game-container">
    <div id="capsules-bar"></div>
    <div id="ui-bg"></div>
    <div id="version">LAST DELIVERY · v1.1</div>
  </div>
  <div id="controls">
    <div id="speedo-wrap">
      <canvas id="speedo" width="108" height="108"></canvas>
      <div id="dist-val">0 m</div>
    </div>
    <div id="btn-group">
      <button id="btn-gas">
        <svg viewBox="0 0 60 60" fill="none">
          <rect x="6" y="25" width="48" height="10" rx="5" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
          <rect x="8" y="26.5" width="44" height="3" rx="1.5" fill="rgba(255,255,255,0.18)"/>
          <rect x="38" y="20" width="16" height="19" rx="4" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
          <line x1="42" y1="21" x2="42" y2="38" stroke="rgba(255,255,255,0.3)" stroke-width="1.1"/>
          <line x1="46" y1="21" x2="46" y2="38" stroke="rgba(255,255,255,0.3)" stroke-width="1.1"/>
          <line x1="50" y1="21" x2="50" y2="38" stroke="rgba(255,255,255,0.3)" stroke-width="1.1"/>
          <ellipse cx="54" cy="29.5" rx="2" ry="9" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
          <path d="M18 18 Q13 29.5 18 41" stroke="rgba(255,255,255,0.38)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          <path d="M15 37 L18 41 L23 38" stroke="rgba(255,255,255,0.38)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </button>
      <button id="btn-nitro"><span id="nitro-icon">⚡</span></button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<script>
const gc=document.getElementById('game-container');
const W=window.innerWidth, H=gc.clientHeight||(window.innerHeight-150);
const GY=H*.72, BR=GY-26;
const TW=W*6;

// ── Константы скорости ──
const KMH_RISE     = 8;    // медленный подъём стрелки
const KMH_FALL     = 55;
const BG_KMH_RISE  = 48;   // разгон фона (быстрый, независимо от стрелки)
const KMH_MAX     = 110;
const PX_PER_KMH  = 22.0;  // базовая скорость фона
const WHEEL_DIV   = 12;
const BURNOUT_DUR = 0.44;
const BOUNCE_STR  = 140;
const BOUNCE_GRAV = 270;

// ── Спидометр ──
const SC=document.getElementById('speedo'),sx=SC.getContext('2d');
const SR=52,SCX=54,SCY=54,SA=Math.PI*.75,SW=Math.PI*1.5;
function drawSpeedo(kmh){
  sx.clearRect(0,0,108,108);
  const g=sx.createRadialGradient(SCX,SCY,16,SCX,SCY,SR);
  g.addColorStop(0,'#111');g.addColorStop(1,'#050505');
  sx.beginPath();sx.arc(SCX,SCY,SR,0,Math.PI*2);sx.fillStyle=g;sx.fill();
  sx.beginPath();sx.arc(SCX,SCY,SR-1,0,Math.PI*2);sx.strokeStyle='rgba(255,255,255,0.1)';sx.lineWidth=1.5;sx.stroke();
  sx.beginPath();sx.arc(SCX,SCY,SR-9,SA,SA+SW);sx.strokeStyle='rgba(255,255,255,0.05)';sx.lineWidth=5;sx.stroke();
  const fr=Math.min(kmh/250,1);
  if(fr>0){sx.beginPath();sx.arc(SCX,SCY,SR-9,SA,SA+SW*fr);sx.strokeStyle=kmh>200?'#ff2d55':kmh>140?'#ffaa00':'#fb923c';sx.lineWidth=5;sx.stroke();}
  for(let i=0;i<=25;i++){const r=i/25,a=SA+SW*r,mj=i%5===0;sx.beginPath();sx.moveTo(SCX+Math.cos(a)*(SR-16),SCY+Math.sin(a)*(SR-16));sx.lineTo(SCX+Math.cos(a)*(mj?SR-7:SR-11),SCY+Math.sin(a)*(mj?SR-7:SR-11));sx.strokeStyle=mj?'rgba(255,255,255,0.7)':'rgba(255,255,255,0.18)';sx.lineWidth=mj?1.4:0.7;sx.stroke();}
  sx.font='bold 8px monospace';sx.textAlign='center';sx.textBaseline='middle';
  [0,50,100,150,200,250].forEach(v=>{const a=SA+SW*(v/250);sx.fillStyle=v>=200?'#ff2d55':'rgba(255,255,255,0.5)';sx.fillText(v,SCX+Math.cos(a)*(SR-22),SCY+Math.sin(a)*(SR-22));});
  const na=SA+SW*fr;sx.save();sx.translate(SCX,SCY);sx.rotate(na);
  sx.shadowColor='rgba(251,146,60,0.7)';sx.shadowBlur=5;
  sx.beginPath();sx.moveTo(-5,0);sx.lineTo(SR-14,0);sx.lineTo(SR-10,-1.2);sx.lineTo(SR-10,1.2);sx.closePath();sx.fillStyle='#fb923c';sx.fill();
  sx.shadowBlur=0;sx.beginPath();sx.moveTo(-5,0);sx.lineTo(-12,0);sx.strokeStyle='rgba(255,255,255,0.25)';sx.lineWidth=1.8;sx.stroke();sx.restore();
  sx.beginPath();sx.arc(SCX,SCY,4,0,Math.PI*2);sx.fillStyle='#222';sx.fill();
  sx.beginPath();sx.arc(SCX,SCY,2.5,0,Math.PI*2);sx.fillStyle='#fb923c';sx.fill();
  sx.font='bold 16px monospace';sx.textAlign='center';sx.textBaseline='middle';
  sx.fillStyle=kmh>200?'#ff2d55':kmh>140?'#ffaa00':'#fb923c';sx.fillText(Math.round(kmh),SCX,SCY+20);
  sx.font='6px monospace';sx.fillStyle='rgba(255,255,255,0.22)';sx.fillText('km/h',SCX,SCY+30);
}
drawSpeedo(0);

// ── UI ──
const elDist=document.getElementById('dist-val'),elCapsBar=document.getElementById('capsules-bar');
const btnGas=document.getElementById('btn-gas'),btnNitro=document.getElementById('btn-nitro');
function initCaps(n){elCapsBar.innerHTML='';for(let i=0;i<20;i++){const d=document.createElement('div');d.className='cap'+(i<n?'':' dead');d.id='cap'+i;elCapsBar.appendChild(d);}}
initCaps(20);
let gasHeld     = false;
let nitroHeld   = false;
let gasPressTime= 0;
const TAP_MAX_MS= 175; // < этого = тап → прыжок при движении

function onGasDown(){
  gasPressTime=Date.now();
  gasHeld=true; btnGas.classList.add('pressed');
}
function onGasUp(){
  const tapMs=Date.now()-gasPressTime;
  gasHeld=false; btnGas.classList.remove('pressed');
  // Быстрый тап ПРИ ДВИЖЕНИИ = прыжок
  if(tapMs<TAP_MAX_MS){
    const gs=window._gs;
    if(gs&&gs.bgScrollKmh>12&&gs.onGround&&gs.jumpPhase==='none'&&!gs.crashed&&!gs.burnoutActive&&!gs.prepActive){
      gs.startJump(false); // тап = слабый прыжок
    }
  }
}
function bindBtn(el,d,u){
  ['touchstart','mousedown'].forEach(e=>el.addEventListener(e,ev=>{ev.preventDefault&&ev.preventDefault();d();},{passive:false}));
  ['touchend','touchcancel','mouseup','mouseleave'].forEach(e=>el.addEventListener(e,ev=>{ev.preventDefault&&ev.preventDefault();u();},{passive:false}));
}
bindBtn(btnGas,onGasDown,onGasUp);
bindBtn(btnNitro,()=>nitroHeld=true,()=>nitroHeld=false);

// ── Цвета ──
const C={rustD:0x5c2d0a,rust:0x8b4513,rustL:0xb5651d,wheel:0x1a1a1a,rim:0x4a4035,spoke:0x5a5040,skin:0xe8d5b0,shirt:0xd4c49a,pants:0x3d4a2f,boots:0x2a1f10,helmet:0x3a4a30,mask:0x5a6a4a,goggle:0x8b7355,exhaust:0x666055};

// ── Гараж ──
function drawGarageAt(g, x) {
  const gH=GY*.88, gW=185, doorW=90, lw=42, rw=gW-lw-doorW;
  const lintelH=gH*.13;
  // Левая стена
  g.fillStyle(0x0c0a07,1);g.fillRect(x,GY-gH,lw,gH);
  // Правая стена
  g.fillStyle(0x0e0c09,1);g.fillRect(x+lw+doorW,GY-gH,rw,gH);
  // Верхняя балка
  g.fillStyle(0x0a0907,1);g.fillRect(x,GY-gH,gW,lintelH);
  // Горизонтальные полосы (кирпич)
  g.fillStyle(0x171410,.5);
  for(let wy=GY-gH+lintelH+10;wy<GY;wy+=15){g.fillRect(x+4,wy,lw-8,1.2);if(rw>6)g.fillRect(x+lw+doorW+3,wy,rw-6,1.2);}
  // Рамка двери
  g.lineStyle(2,0x1e1a14,.65);g.strokeRect(x+lw,GY-gH+lintelH,doorW,gH-lintelH);
  // Тёмный интерьер
  g.fillStyle(0x060504,.8);g.fillRect(x+lw+2,GY-gH+lintelH+2,doorW-4,gH-lintelH-2);
  // Крыша слева (продолжение)
  g.fillStyle(0x0c0a07,1);g.fillRect(x-30,GY-gH,30,gH*.1);
  g.fillStyle(0x0a0907,1);g.fillRect(x-30,GY-gH,30,gH*.06);
  // Щели/трещины на стене
  g.lineStyle(1,0x1a1510,.5);
  g.beginPath();g.moveTo(x+12,GY-gH+lintelH+20);g.lineTo(x+18,GY-gH*0.4);g.strokePath();
  g.beginPath();g.moveTo(x+lw+doorW+8,GY-gH+lintelH+15);g.lineTo(x+lw+doorW+5,GY-gH*0.3);g.strokePath();
}

// ── Булыжники ──
function genCobbles(dense){
  const d=[];let x=0,s=999;
  while(x<TW){const w=12+((s*9301+49297)%233280)/233280*22,h=6+(((s+1)*9301+49297)%233280)/233280*11,y=GY+8+(((s+2)*9301+49297)%233280)/233280*28,sh=Math.floor((((s+3)*9301+49297)%233280)/233280*5);d.push({x,y,w,h,sh});x+=1+(((s+4)*9301+49297)%233280)/233280*(dense?5:13);s+=5;}
  return d;
}

// ── Функция фона (из v0.9) ──
function buildBG(g, GY, W) {
  function ruin(x,w,h,dark){
    const y=GY-h,c=dark||0x0d0b09;
    g.fillStyle(c,1);g.fillRect(x,y,w,h);
    g.fillStyle(0x0f0d14,1);
    const ch=Math.max(2,Math.floor(w/18));
    for(let i=0;i<ch;i++){const bx=x+i*(w/ch),nw=w/ch,bh=4+Math.floor(Math.random()*20);if(Math.random()>.4)g.fillTriangle(bx,y,bx+nw,y,bx+nw*.5,y-bh);}
    g.fillStyle(c,1);
    if(w>30){g.fillStyle(0xff6800,.055);for(let wy=y+10;wy<GY-10;wy+=18)for(let wx=x+5;wx<x+w-5;wx+=14)if(Math.random()>.6)g.fillRect(wx,wy,6,9);g.fillStyle(c,1);}
  }
  function hill(x,w,h){const by=GY+2;g.fillStyle(0x0b0908,.9);g.fillTriangle(x,by,x+w,by,x+w*.5,by-h);g.fillStyle(0x181008,.3);g.fillTriangle(x+w*.5,by-h,x+w*.62,by,x+w*.88,by);}
  function factory(x,w,h){g.fillStyle(0x0f0c0a,1);g.fillRect(x,GY-h,w,h);g.fillStyle(0x0c0a08,1);g.fillRect(x+w*.65,GY-h-28,9,30);g.fillStyle(0x0e0b09,1);g.fillRect(x-22,GY-h*.6,20,h*.6);g.fillStyle(0x1a1612,.35);for(let wy=GY-h+8;wy<GY-6;wy+=14)g.fillRect(x+2,wy,w-4,2);}
  function tower(x,h,lean){const t_=lean||0,mx=x+t_*h/2,by=GY;g.lineStyle(4,0x100e0c,.88);g.beginPath();g.moveTo(x-12,by);g.lineTo(mx-4,by-h);g.strokePath();g.beginPath();g.moveTo(x+12,by);g.lineTo(mx+4,by-h);g.strokePath();g.lineStyle(2,0x100e0c,.65);for(let f=.15;f<.9;f+=.22){const ly=by-h*f,lw=(1-f)*18;g.beginPath();g.moveTo(x-lw+t_*h*f/2,ly);g.lineTo(x+lw+t_*h*f/2,ly);g.strokePath();}g.lineStyle(3,0x100e0c,.78);g.beginPath();g.moveTo(mx,by-h);g.lineTo(mx+18,by-h-16);g.strokePath();}
  function waterTower(x,h){const by=GY,lH=h*.55,tH=h*.45;g.lineStyle(4,0x100e0c,.82);g.beginPath();g.moveTo(x-22,by);g.lineTo(x-7,by-lH);g.strokePath();g.beginPath();g.moveTo(x,by);g.lineTo(x,by-lH);g.strokePath();g.beginPath();g.moveTo(x+22,by);g.lineTo(x+7,by-lH);g.strokePath();g.lineStyle(2,0x100e0c,.55);g.beginPath();g.moveTo(x-18,by-lH*.4);g.lineTo(x+18,by-lH*.4);g.strokePath();g.fillStyle(0x0f0d0b,1);g.fillEllipse(x,by-lH-tH*.5,48,tH);g.fillStyle(0x19160e,.28);g.fillEllipse(x,by-lH-tH*.38,38,tH*.28);}
  function skyscraper(x,w,h){g.fillStyle(0x0e0c11,1);g.fillRect(x,GY-h,w,h);g.fillStyle(0x0f0d14,1);for(let i=0;i<3;i++){const px=x+5+i*(w/3),ph=12+Math.random()*28,pw=Math.min(w/4,14);g.fillRect(px,GY-h+8+i*10,pw,ph);}g.lineStyle(2,0x0e0c0f,.75);g.beginPath();g.moveTo(x+w*.5,GY-h);g.lineTo(x+w*.5,GY-h-32);g.strokePath();}
  function bridge(x){const bh=GY*.13;g.fillStyle(0x100e0c,1);g.fillRect(x,GY-bh,26,bh);g.lineStyle(8,0x100e0c,.82);g.beginPath();g.moveTo(x+26,GY-bh*.88);g.lineTo(x+108,GY-bh*.32);g.strokePath();g.fillStyle(0x100e0c,1);g.fillRect(x+138,GY-bh*.62,22,bh*.62);g.lineStyle(2,0x100e0c,.58);g.beginPath();g.moveTo(x+10,GY-bh);g.lineTo(x+58,GY-bh*.22);g.strokePath();}
  // Зоны
  ruin(10,50,GY*.52,0x0d0b09);ruin(78,32,GY*.36,0x100e0c);ruin(128,60,GY*.64,0x0c0a08);ruin(245,42,GY*.44,0x0f0d0b);ruin(308,28,GY*.30,0x110f0d);ruin(355,65,GY*.58,0x0d0b09);ruin(W-80,40,GY*.40,0x100e0c);
  hill(W+10,180,GY*.52);hill(W+210,130,GY*.42);hill(W+360,220,GY*.60);ruin(W+150,18,GY*.14,0x0e0c0a);ruin(W+500,24,GY*.18,0x0e0c0a);
  factory(2*W+15,85,GY*.50);factory(2*W+140,65,GY*.42);ruin(2*W+240,30,GY*.28,0x0f0d0b);factory(2*W+310,90,GY*.56);g.fillStyle(0x0c0a08,1);g.fillRect(2*W+430,GY-GY*.35,14,GY*.35);g.fillRect(2*W+462,GY-GY*.25,11,GY*.25);g.fillStyle(0x0e0c0a,1);g.fillEllipse(2*W+492,GY-GY*.18,36,20);
  tower(3*W+30,GY*.55,0);tower(3*W+120,GY*.65,.12);waterTower(3*W+220,GY*.60);tower(3*W+320,GY*.48,-.08);tower(3*W+420,GY*.72,0);waterTower(3*W+520,GY*.50);ruin(3*W+W-60,20,GY*.18,0x0e0c0a);
  skyscraper(4*W+10,45,GY*.68);ruin(4*W+70,25,GY*.32,0x100e0c);skyscraper(4*W+120,55,GY*.75);skyscraper(4*W+200,38,GY*.60);ruin(4*W+265,30,GY*.38,0x0f0d0b);skyscraper(4*W+320,60,GY*.70);ruin(4*W+410,22,GY*.24,0x100e0c);skyscraper(4*W+460,48,GY*.65);
  bridge(5*W+10);ruin(5*W+200,55,GY*.58,0x0d0b09);waterTower(5*W+290,GY*.55);ruin(5*W+370,35,GY*.42,0x0f0d0b);bridge(5*W+450);ruin(5*W+620,48,GY*.50,0x0d0b09);ruin(5*W+W-50,30,GY*.30,0x100e0c);
}

class GameScene extends Phaser.Scene{
  constructor(){super('Game');}

  create(){
    window._gs=this;

    // ── Визуальная скорость (спидометр + фон) ──
    this.vizKmh   = 0;     // км/ч на приборе (медленный)
    this.bgScrollKmh = 0; // км/ч фона (быстрый)
    this.bgScroll = 0;
    this.wasGas   = false; // предыдущее состояние газа

    // ── Прыжок ──
    this.bikeBaseY = BR;
    this.bikeVY    = 0;
    this.onGround  = true;
    this.jumpPhase = 'none';
    this.jumpTimer = 0;
    this.targetRot = 0;

    // ── Отскок при приземлении ──
    this.bounceY   = 0;
    this.bounceVY  = 0;
    this.bouncing  = false;

    // ── Колёса ──
    this.wAngle    = 0;
    this.wheelRPS  = 0;   // рад/с

    // ── Пробуксовка старта ──
    this.burnoutActive = false;
    this.burnoutTimer  = 0;
    this.isFirstStart  = true;  // первый запуск — максимальный козлик
    this.prepActive    = false;
    this.prepTimer     = 0;
    this.lurchActive   = false;
    this.lurchTimer    = 0;
    // ── Пружина остановки ──
    this.stopSpringActive = false;
    this.stopSpringPhase  = 0;
    this.stopSpringAmt    = 0;
    this.prevVizKmh       = 0;
    // ── Торможение — задняя ось вверх ──
    this.brakeActive      = false;
    this.brakeTimer       = 0;
    this.brakeLifted      = 0;  // насколько задняя часть поднялась
    // ── Вобблинг при приземлении ──
    this.landingWobble    = false;
    this.landingWobbleAmt = 0;
    this.landingWobblePhase = 0;
    this.frontWheelYOff   = 0;  // смещение переднего колеса (вобблинг)
    this.stopPebblesSpawned = false;

    // ── Нитро / капсулы / краш ──
    this.nitroPct  = 0;
    this.nitroOn   = false;
    this.nitroTimer= 0;
    this.capsules  = 20;
    this.crashed   = false;
    this.crashTimer= 0;
    this.shakeAmt  = 0;
    this.shakeX    = 0;
    this.shakeY    = 0;
    this.dustP     = [];
    this.crashP    = [];

    this.dCA = genCobbles(true);
    this.dCB = genCobbles(false);

    // ── Небо ──
    this.createSky();

    // ── Дальние силуэты (холмы) ──
    this.gBG1=this.add.graphics().setDepth(1);
    [0,TW].forEach(off=>{
      [[60,100,GY*.26],[220,140,GY*.20],[380,90,GY*.23],[W*.7,120,GY*.18],[W*1.1,80,GY*.16],[W*1.5,150,GY*.28],[W*1.8,110,GY*.22],[W*2.2,130,GY*.24],[W*2.7,90,GY*.18],[W*3.1,140,GY*.26],[W*3.6,100,GY*.20],[W*4.0,160,GY*.30],[W*4.5,85,GY*.17],[W*5.0,120,GY*.23],[W*5.4,140,GY*.26]].forEach(h=>{
        const x=h[0]+off,w=h[1],ht=h[2],by=GY+1;
        this.gBG1.fillStyle(0x0e0c12,.62);this.gBG1.fillTriangle(x,by,x+w,by,x+w*.5,by-ht);
        this.gBG1.fillStyle(0x14101a,.22);this.gBG1.fillTriangle(x+w*.5,by-ht,x+w*.6,by,x+w*.84,by);
      });
    });

    // ── Основные здания/силуэты ──
    this.gBG2=this.add.graphics().setDepth(2);
    [0,TW].forEach(off=>{this.gBG2.translateCanvas(off,0);buildBG(this.gBG2,GY,W);this.gBG2.translateCanvas(-off,0);});

    this.bgLayers=[
      {g:this.gBG1, factor:0.05},
      {g:this.gBG2, factor:0.16},
    ];

    // ── Земля + гараж ──
    this.gG      = this.add.graphics().setDepth(5);
    this.gGarage = this.add.graphics().setDepth(6);

    // ── Частицы ──
    this.gPt = this.add.graphics().setDepth(9);

    // ── Колёса: отдельный слой ВНЕ контейнера (мировые координаты) ──
    this.gWheels = this.add.graphics().setDepth(10);

    // ── Fade снизу (тонкий — меньше тёмной зоны под дорогой) ──
    const fd=this.add.graphics().setDepth(14);
    const fh=Math.round(H*.06);
    for(let i=0;i<fh;i++){fd.fillStyle(0x000000,i/fh*.85);fd.fillRect(0,H-fh+i,W,1);}

    // ── Байк (тело без колёс) ──
    this.bikeC=this.add.container(W*.36,BR).setDepth(11);
    this.bikeG=this.add.graphics();
    this.bikeC.add(this.bikeG);

    this.cursors=this.input.keyboard.createCursorKeys();
    this.keyX=this.input.keyboard.addKey('X');
    this.keyN=this.input.keyboard.addKey('N');
    this.keySpace=this.input.keyboard.addKey('SPACE');
  }

  createSky(){
    const g=this.add.graphics().setDepth(0);
    // Верхние 50% — тёмно-сиреневое небо (заметно светлее)
    for(let i=0;i<H*.5;i++){
      const t=i/(H*.5);
      g.fillStyle(Phaser.Display.Color.GetColor(
        Math.round(Phaser.Math.Linear(0x38,0x62,t)),
        Math.round(Phaser.Math.Linear(0x32,0x52,t)),
        Math.round(Phaser.Math.Linear(0x50,0x70,t))
      ));
      g.fillRect(0,i,W,1);
    }
    // Нижние 50% — яркое тёплое зарево
    for(let i=0;i<H*.5;i++){
      const t=i/(H*.5);
      g.fillStyle(Phaser.Display.Color.GetColor(
        Math.round(Phaser.Math.Linear(0x62,0xe8,t)),
        Math.round(Phaser.Math.Linear(0x52,0x60,t)),
        Math.round(Phaser.Math.Linear(0x70,0x10,t))
      ));
      g.fillRect(0,H*.5+i,W,1);
    }
    // Яркая полоска у горизонта
    g.fillStyle(0xff7800,.62);g.fillRect(0,GY-16,W,14);
    g.fillStyle(0xffaa00,.40);g.fillRect(0,GY-5,W,5);
  }

  // ── Земля + булыжники ──
  drawGround(){
    const g=this.gG;g.clear();
    g.fillStyle(0x18130a);g.fillRect(0,GY+6,W,H-GY);
    g.fillStyle(0x22190c);g.fillRect(0,GY+5,W,3);
    // Скорость скролла булыжников = bgScroll (главный scroll)
    const sA=(this.bgScroll*.92)%TW;
    const sB=(this.bgScroll*.40)%TW;
    [0,TW].forEach(rep=>{
      this.dCB.forEach(s=>{const sx_=s.x+rep-sB;if(sx_>W+40||sx_+s.w<-20)return;g.fillStyle(0x1c1610+s.sh*0x010100,.6);g.fillRoundedRect(sx_,s.y+16,s.w*.65,s.h*.5,2);});
      this.dCA.forEach(s=>{const sx_=s.x+rep-sA;if(sx_>W+50||sx_+s.w<-30)return;g.fillStyle(0x22180e+s.sh*0x020200,.88);g.fillRoundedRect(sx_,s.y,s.w,s.h,3);g.fillStyle(0x382c1a,.4);g.fillRect(sx_+2,s.y+1,s.w-4,2);g.fillStyle(0x080604,.3);g.fillRect(sx_+1,s.y+s.h-2,s.w-2,2);});
    });
  }

  // ── Гараж ──
  drawGarage(){
    // Начальная позиция: дверь гаража совпадает с байком (W*0.22)
    // Прокрутка гаража чуть медленнее ближнего плана — дольше виден
    const gx = W*.36 - 90 - this.bgScroll * 0.28;
    if(gx > -210){
      this.gGarage.clear();
      drawGarageAt(this.gGarage, gx);
    } else {
      this.gGarage.clear();
    }
  }

  // ── Байк ──
  drawBike(){
    const g=this.bikeG;g.clear();
    const wR=22,wF=32,wB=-54,aY=0,fY=-wR-2;
    g.lineStyle(6,C.rust);g.strokeRect(wB+10,fY-20,wF-wB-20,20);
    g.lineStyle(5,C.rustL);g.beginPath();g.moveTo(wB+18,fY);g.lineTo(-4,fY-28);g.strokePath();
    g.lineStyle(4,C.rustL);g.beginPath();g.moveTo(wB+18,fY);g.lineTo(wB+18,aY);g.strokePath();
    g.lineStyle(4,C.rust);g.beginPath();g.moveTo(-4,fY-28);g.lineTo(wF,aY);g.strokePath();g.beginPath();g.moveTo(-4,fY-24);g.lineTo(wF,aY);g.strokePath();
    g.fillStyle(C.rustL);g.fillRoundedRect(-26,fY-34,50,20,7);g.fillStyle(C.rust);g.fillRoundedRect(-26,fY-34,50,9,{tl:7,tr:7,bl:0,br:0});g.fillStyle(C.rustD,.5);g.fillEllipse(-8,fY-26,16,7);
    g.fillStyle(C.rustD);g.fillRoundedRect(wB+12,fY-38,44,11,4);
    g.fillStyle(C.exhaust);g.fillRect(-18,fY-2,28,18);g.fillStyle(C.rustD);g.fillRect(-14,fY+1,20,13);
    g.lineStyle(5,C.exhaust);g.beginPath();g.moveTo(-16,fY+14);g.lineTo(wB+4,fY+17);g.lineTo(wB,aY+4);g.strokePath();
    if(this.nitroOn){const t=this.time.now,fl=Math.sin(t*.03);g.fillStyle(0x0044cc,(.3+fl*.18));g.fillEllipse(wB-18,aY+4,34+fl*8,15);g.fillStyle(0x44aaff,(.5+fl*.18));g.fillEllipse(wB-12,aY+4,22+fl*5,9);g.fillStyle(0xaaddff,(.65+fl*.2));g.fillEllipse(wB-6,aY+4,12+fl*3,6);g.fillStyle(0xffffff,(.75+fl*.2));g.fillEllipse(wB-2,aY+4,6+fl*2,4);}
    else if(this.jumpBoost){
      // Два красных огонька — на 75% больше
      const t=this.time.now,fl=Math.sin(t*.05);
      g.fillStyle(0xdd1100,.65+fl*.25);g.fillEllipse(wB-20,aY+4,35+fl*10,14);
      g.fillStyle(0xff4400,.80+fl*.15);g.fillEllipse(wB-11,aY+4,21+fl*7,9);
      g.fillStyle(0xff8800,.55+fl*.2);g.fillEllipse(wB-4,aY+3,11+fl*4,5);
    }
    else if(this.vizKmh>5){g.fillStyle(0xff6600,.18+Math.sin(this.time.now*.04)*.07);g.fillEllipse(wB-7,aY+4,11,5);}
    g.fillStyle(C.rustD);g.fillRect(-10,fY-50,4,18);g.fillStyle(C.exhaust);g.fillRect(-18,fY-54,18,5);
    g.fillStyle(C.goggle);g.fillCircle(wF-1,fY-18,7);g.fillStyle(0xffcc44,.2);g.fillCircle(wF-1,fY-18,4);
    // Колёса рисуются отдельно в drawWheels() — мировые координаты
    this.drawRay(g,fY);
  }

  // ── Колёса в МИРОВЫХ координатах — не зависят от наклона байка ──
  drawWheels(){
    const g=this.gWheels; g.clear();
    const wR=22, wB=-54, wF=32, aY=0;
    const cx=this.bikeC.x, cy=this.bikeC.y;
    const rot=this.bikeC.rotation;
    const cosR=Math.cos(rot), sinR=Math.sin(rot);

    [[wB,aY],[wF,aY]].forEach(([lx,ly])=>{
      // Позиция центра колеса в мировых координатах
      const wx=cx+lx*cosR-ly*sinR;
      const wy=cy+lx*sinR+ly*cosR;

      // Шина
      g.lineStyle(10,C.wheel);
      g.strokeCircle(wx,wy,wR);

      // Спицы — угол ТОЛЬКО от wAngle, без наклона контейнера
      g.lineStyle(1.5,C.spoke);
      for(let s=0;s<8;s++){
        const a=this.wAngle+(s/8)*Math.PI*2;
        g.beginPath();
        g.moveTo(wx,wy);
        g.lineTo(wx+Math.cos(a)*(wR-3),wy+Math.sin(a)*(wR-3));
        g.strokePath();
      }

      // Обод
      g.lineStyle(3,C.rim);
      g.strokeCircle(wx,wy,wR*.52);

      // Ступица
      g.fillStyle(C.exhaust);g.fillCircle(wx,wy,4);
      g.fillStyle(C.rustD);g.fillCircle(wx,wy,2);
    });
  }

  drawRay(g,fY){
    const bx=-18,by=fY-36;
    g.fillStyle(C.shirt);g.fillRect(bx-7,by-26,17,28);g.fillStyle(C.rustD,.28);g.fillEllipse(bx,by-18,5,3);
    g.fillStyle(C.pants);g.fillRect(bx-5,by+2,13,14);g.fillRect(bx+5,by+10,9,16);
    g.fillStyle(C.boots);g.fillRect(bx+3,by+24,14,7);
    g.fillStyle(C.skin);g.fillRect(bx+5,by-20,22,4);g.fillRect(bx+24,by-24,4,9);g.fillRect(bx-1,by-34,7,9);
    g.fillStyle(C.helmet);g.fillRoundedRect(bx-9,by-60,20,20,6);g.fillStyle(0xffffff,.07);g.fillRoundedRect(bx-6,by-58,9,7,3);
    g.fillStyle(C.goggle);g.fillRoundedRect(bx-4,by-48,14,6,2);g.fillStyle(C.mask);g.fillRoundedRect(bx-5,by-42,16,11,3);
  }

  startJump(strong=true){
    if(!this.onGround||this.crashed||this.jumpPhase!=='none')return;
    // Тап = 45% слабее; удержание (strong) = полный прыжок
    this.bikeVY   = strong ? -560 : -308;
    this.onGround = false;
    this.jumpPhase= 'air';
    this.targetRot= -0.22;
  }

  updateJump(dt){
    switch(this.jumpPhase){
      case'air':
        this.bikeBaseY+=this.bikeVY*dt;
        this.bikeVY+=960*dt;
        // Козлик в воздухе: нос сильно задран вверх
        const airTgt = this.bikeVY < 0 ? -0.42 : -0.28; // взлёт — сильнее, снижение — чуть меньше
        this.targetRot=Phaser.Math.Linear(this.targetRot, airTgt, .06);
        if(this.bikeBaseY>=BR){
          this.bikeBaseY=BR;this.bikeVY=0;this.onGround=true;
          this.jumpPhase='landing';this.jumpTimer=0.30;
          this._triggerBounce(185);       // первый отскок выше
          this.targetRot=-0.28;           // переднее колесо сильнее вверх
          this.landingWobble=true;
          this.landingWobbleAmt=0.16;
          this.landingWobblePhase=0;
          this.shakeAmt=5;
        }
        break;
      case'landing':
        this.jumpTimer-=dt;
        // Плавно выравниваем с задранного положения
        this.targetRot=Phaser.Math.Linear(this.targetRot,0.0,.06);
        if(this.jumpTimer<=0){this.jumpPhase='none';this.targetRot=0;}
        break;
    }
  }

  // ── Отскок: 1й высокий (65°), 2й ниже (36°), короткий gap ──
  _triggerBounce(strength){this.bouncing=true;this.bounceVY=-(strength||BOUNCE_STR);this.bounceY=0;}

  updateBounce(dt){
    if(!this.bouncing)return;
    this.bounceY+=this.bounceVY*dt;
    this.bounceVY+=500*dt;  // высокая гравитация = короткий gap между отскоками
    if(this.bounceY>=0){
      this.bounceY=0;
      const spd=Math.abs(this.bounceVY);
      if(spd>55){
        this.bounceVY=-spd*.55; // 2й: 36/65≈55% от первого
      } else if(spd>20){
        this.bounceVY=-spd*.18; // микро-третий
      } else {
        this.bouncing=false;this.bounceVY=0;
      }
    }
  }

  spawnBurnoutSmoke(){
    // Густой дым у точки контакта + вылетающие камешки
    for(let i=0;i<4;i++){
      this.dustP.push({
        x:this.bikeC.x-52+Phaser.Math.Between(-5,5),
        y:GY,
        vx:Phaser.Math.FloatBetween(-40,-6),
        vy:Phaser.Math.FloatBetween(-18,-50),
        life:0.45,
        size:Phaser.Math.FloatBetween(5,13),
        col:0xc0c0c0,
      });
    }
    // Вылетающие камешки назад — заметные при старте
    if(Math.random()>0.25){
      for(let i=0;i<4;i++){
        this.dustP.push({
          x:this.bikeC.x-52+Phaser.Math.Between(-6,6),
          y:GY-3,
          vx:Phaser.Math.FloatBetween(-140,-60),
          vy:Phaser.Math.FloatBetween(-80,-180),
          life:1.0,
          size:Phaser.Math.FloatBetween(2,5),
          col:[0x504030,0x3a2e20,0x6a5a3a,0x2a2010][Math.floor(Math.random()*4)],
          isPebble:true,
        });
      }
    }
  }

  spawnBrakePebbles(){
    // Камешки из-под переднего колеса при торможении
    for(let i=0;i<3;i++){
      this.dustP.push({
        x:this.bikeC.x+32+Phaser.Math.Between(-4,4),
        y:GY-2,
        vx:Phaser.Math.FloatBetween(30,80),
        vy:Phaser.Math.FloatBetween(-60,-130),
        life:1.0,
        size:Phaser.Math.FloatBetween(1.5,3),
        col:0x503828,
        isPebble:true,
      });
    }
  }

  spawnDust(){
    if(this.vizKmh<15||Math.random()>.32)return;
    this.dustP.push({x:this.bikeC.x-54,y:GY+5,vx:Phaser.Math.FloatBetween(-12,-48),vy:Phaser.Math.FloatBetween(-7,-24),life:1,size:Phaser.Math.FloatBetween(2,5),col:this.nitroOn?0x4488ff:0x6a5a4a});
  }

  triggerCrash(){
    if(this.crashed)return;this.crashed=true;this.crashTimer=1.5;
    const loss=Math.min(Math.ceil(this.vizKmh/15),8);this.capsules=Math.max(0,this.capsules-loss);
    this.shakeAmt=16;this.nitroOn=false;
    this.bikeBaseY=BR;this.bikeVY=0;this.onGround=true;this.jumpPhase='none';this.targetRot=0;this.bouncing=false;this.bounceY=0;
    gasHeld=false;btnGas.classList.remove('pressed');
    this.cameras.main.flash(160,244,63,94,false);
    for(let i=0;i<22;i++){const a=Math.random()*Math.PI*2,f=Phaser.Math.FloatBetween(70,210);this.crashP.push({x:this.bikeC.x,y:GY-22,vx:Math.cos(a)*f,vy:Math.sin(a)*f-90,life:1,size:Phaser.Math.FloatBetween(2,7),col:[C.rust,0xff6b00,C.rustL,0x1a1a1a][Math.floor(Math.random()*4)]});}
  }

  activateNitro(){
    if(this.nitroPct<100||this.nitroOn||this.crashed)return;
    this.nitroOn=true;this.nitroTimer=3.5;this.nitroPct=0;
    btnNitro.classList.remove('ready');btnNitro.classList.add('active');
    this.cameras.main.flash(80,52,211,153,false);
  }

  updateParticles(dt){
    this.dustP=this.dustP.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=50*dt;p.life-=dt*1.3;return p.life>0;});
    this.crashP=this.crashP.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=180*dt;p.life-=dt;return p.life>0;});
  }
  drawParticles(){
    const g=this.gPt;g.clear();
    this.dustP.forEach(p=>{
      if(p.isPebble){
        g.fillStyle(p.col,p.life*.85);
        g.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
      } else {
        g.fillStyle(p.col,p.life*.35);
        g.fillCircle(p.x,p.y,p.size*p.life);
      }
    });
    this.crashP.forEach(p=>{g.fillStyle(p.col,p.life);g.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);});
  }

  updateUI(){
    drawSpeedo(this.vizKmh);
    elDist.textContent=Math.round(this.bgScroll*.3)+' m';
    for(let i=0;i<20;i++){const c=document.getElementById('cap'+i);if(c)c.className='cap'+(i<this.capsules?'':' dead');}
    btnNitro.style.setProperty('--np',this.nitroPct.toFixed(1)+'%');
    if(this.nitroOn){btnNitro.classList.add('active');btnNitro.classList.remove('ready');}
    else if(this.nitroPct>=100){btnNitro.classList.add('ready');btnNitro.classList.remove('active');}
    else btnNitro.classList.remove('ready','active');
  }

  update(time,delta){
    const dt=Math.min(delta/1000,.05);
    if(Phaser.Input.Keyboard.JustDown(this.keyX))this.triggerCrash();
    if(Phaser.Input.Keyboard.JustDown(this.keyN))this.activateNitro();
    if(Phaser.Input.Keyboard.JustDown(this.keySpace))this.startJump();

    const gas=gasHeld||this.cursors.right.isDown||this.cursors.up.isDown;

    // ── Краш ──
    if(this.crashed){
      this.crashTimer-=dt;if(this.crashTimer<=0)this.crashed=false;
      this.vizKmh=Math.max(0,this.vizKmh-KMH_FALL*2*dt);
      this.bgScrollKmh=Math.max(0,this.bgScrollKmh-KMH_FALL*2*dt);
      const bgSpdC=this.bgScrollKmh*PX_PER_KMH;
      this.bgScroll+=bgSpdC*dt;
      this.bgLayers.forEach(l=>{l.g.x=-((this.bgScroll*l.factor)%TW);});
      this.updateParticles(dt);this.drawParticles();this.drawGarage();this.drawGround();this.updateUI();return;
    }

    // ── Нитро ──
    if(this.nitroOn){this.nitroTimer-=dt;if(this.nitroTimer<=0){this.nitroOn=false;btnNitro.classList.remove('active');}}
    if(nitroHeld&&this.nitroPct>=100)this.activateNitro();

    // Трекаем время без газа для надёжного триггера козлика
    if(!gas) this.gasOffTime=(this.gasOffTime||0)+dt;

    // ── Скорость: стрелка (медленно) и фон (быстро) — независимо ──
    this.prevVizKmh=this.vizKmh;
    this.prevBgKmh=this.bgScrollKmh;
    if(gas){
      // Козлик при любом старте после паузы >0.3с ИЛИ почти стоп
      if(!this.wasGas&&this.onGround&&!this.prepActive&&!this.burnoutActive){
        if(this.bgScrollKmh<45||(this.gasOffTime||0)>0.35){
          this.prepActive=true; this.prepTimer=0.14;
        }
      }
      this.gasOffTime=0;
      this.brakeActive=false;
      this.vizKmh=Math.min(KMH_MAX,this.vizKmh+KMH_RISE*dt);
      this.bgScrollKmh=Math.min(KMH_MAX,this.bgScrollKmh+BG_KMH_RISE*dt);
    } else {
      this.vizKmh=Math.max(0,this.vizKmh-KMH_FALL*dt);
      this.bgScrollKmh=Math.max(0,this.bgScrollKmh-KMH_FALL*dt);
      if(this.wasGas&&this.prevBgKmh>35&&!this.brakeActive&&this.onGround){
        this.brakeActive=true; this.brakeTimer=0.50;
        this.stopSpringActive=false;
        this.spawnBrakePebbles();
      }
    }
    this.wasGas=gas;

    if(this.vizKmh>10&&!this.nitroOn)
      this.nitroPct=Math.min(100,this.nitroPct+(this.bgScrollKmh/KMH_MAX)*12*dt);

    // ── Фаза подготовки (намёк перед козликом) ──
    if(this.prepActive){
      this.prepTimer-=dt;
      this.targetRot=-0.08; // нос слегка вверх
      if(this.prepTimer<=0){
        this.prepActive=false;
        this.burnoutActive=true; this.burnoutTimer=BURNOUT_DUR;
      }
    }

    // ── Пробуксовка ──
    if(this.burnoutActive){
      this.burnoutTimer-=dt;
      this.wAngle+=50*dt;
      this.spawnBurnoutSmoke();
      if(this.burnoutTimer<=0){
        this.burnoutActive=false;
        this.isFirstStart=false;  // первый старт завершён
        this.lurchActive=true; this.lurchTimer=0.30;
      }
    }

    // ── Торможение — чистое вращение (нет вертикального прыжка) ──
    if(this.brakeActive){
      this.brakeTimer-=dt;
      if(this.brakeTimer<=0){
        this.brakeActive=false;
        // Пружина в самом конце
        if(!this.stopSpringActive){
          this.stopSpringActive=true;this.stopSpringPhase=0;this.stopSpringAmt=0.06;
        }
      }
    }

    const scrollMult=this.burnoutActive?0.04:1.0;
    // Ступенчатое ускорение фона: +15% после 50, ещё +15% после 100
    let tierMult=1.0;
    if(this.bgScrollKmh>100) tierMult=1.80;
    else if(this.bgScrollKmh>50) tierMult=1.50;
    const bgSpd=this.bgScrollKmh*PX_PER_KMH*scrollMult*tierMult;
    this.bgScroll+=bgSpd*dt;
    this.bgLayers.forEach(l=>{l.g.x=-((this.bgScroll*l.factor)%TW);});

    this.updateJump(dt);
    this.updateBounce(dt);

    // ── Буст во время прыжка: держим газ = летим дальше + красные огни ──
    this.jumpBoost = gasHeld && this.jumpPhase==='air';
    if(this.jumpBoost){
      // Фон движется быстрее — ощущение большего прыжка
      this.bgScrollKmh=Math.min(KMH_MAX, this.bgScrollKmh+28*dt);
    }

    // ── Вобблинг переднего колеса после приземления ──
    if(this.landingWobble){
      this.landingWobblePhase+=14*dt;
      this.landingWobbleAmt=Math.max(0,this.landingWobbleAmt-0.22*dt);
      if(this.landingWobbleAmt<0.004)this.landingWobble=false;
    }

    // ── Скорость колёс (всегда вперёд — положительный угол) ──
    if(!this.burnoutActive){
      const targetRPS=this.onGround?Math.max(0,bgSpd/WHEEL_DIV):Math.max(0,this.wheelRPS-1.8*dt);
      this.wheelRPS=Phaser.Math.Linear(this.wheelRPS,targetRPS,.22);
      this.wAngle+=this.wheelRPS*dt; // всегда +, колёса всегда вперёд
    }

    if(this.shakeAmt>0){this.shakeX=(Math.random()-.5)*this.shakeAmt*2;this.shakeY=(Math.random()-.5)*this.shakeAmt*2;this.shakeAmt*=.78;if(this.shakeAmt<.4)this.shakeAmt=this.shakeX=this.shakeY=0;}

    // ── Вращение байка ──
    let rotTgt=this.targetRot;
    if(this.jumpPhase==='none'){
      if(this.burnoutActive){
        // Первый запуск: максимальный козлик. Последующие: 50%
        rotTgt = this.isFirstStart ? -0.62 : -0.31;
      } else if(this.prepActive){
        rotTgt=-0.08;
      } else if(this.lurchActive){
        rotTgt=-0.16;
        this.lurchTimer-=dt; if(this.lurchTimer<=0)this.lurchActive=false;
      } else if(this.brakeActive){
        const bp = 1-(this.brakeTimer/0.50);
        const peak = 0.25;
        const r = bp < peak
          ? (bp/peak)
          : 1-((bp-peak)/0.75);
        // При >50 км/ч — задираем, при <50 — слабее. Оба -20% от прежних
        const brakePeak = this.prevBgKmh > 50 ? 0.44 : 0.21;
        rotTgt = r * brakePeak;
      } else if(gas){
        rotTgt=-(0.01+this.vizKmh/KMH_MAX*0.065);
      } else if(this.vizKmh>18){
        rotTgt=0.08*(this.vizKmh/KMH_MAX);
      } else if(this.vizKmh>5){
        rotTgt=0.02;
      } else {
        rotTgt=0.015;
      }
      if(this.stopSpringActive){
        this.stopSpringPhase+=8*dt;
        rotTgt+=Math.sin(this.stopSpringPhase)*this.stopSpringAmt;
        this.stopSpringAmt=Math.max(0,this.stopSpringAmt-0.08*dt);
        if(this.stopSpringAmt<0.003)this.stopSpringActive=false;
      }
      if(this.landingWobble){
        rotTgt+=Math.sin(this.landingWobblePhase)*this.landingWobbleAmt;
      }
    }
    this.bikeC.rotation=Phaser.Math.Linear(this.bikeC.rotation,rotTgt,.14);

    // ── Позиция байка (Y) — компенсация вращения ──
    // rot < 0 (вилли): заднее колесо (wB=-54) тянет вниз → компенсируем через rear
    // rot > 0 (клевок): переднее колесо (wF=32) тянет вниз → компенсируем через front
    const rot = this.bikeC.rotation;
    const rotCompY = rot < 0
      ? 54 * Math.sin(rot)
      : -32 * Math.sin(rot);
    const bob=this.onGround&&this.bgScrollKmh>8?Math.sin(time*.009)*(0.4+this.bgScrollKmh/KMH_MAX*1.2):0;
    this.bikeC.y = this.bikeBaseY + this.bounceY + bob + this.shakeY + rotCompY;
    this.bikeC.x = W * 0.36 + this.shakeX;

    this.drawGarage();
    this.drawGround();
    this.drawWheels(); // колёса — до байка (слой 10)
    this.drawBike();   // тело байка (слой 11)
    this.spawnDust();
    this.updateParticles(dt);
    this.drawParticles();
    this.updateUI();
  }
}

window.addEventListener('load',()=>{
  const gcH=gc.clientHeight||window.innerHeight-150;
  new Phaser.Game({type:Phaser.AUTO,width:W,height:gcH,parent:'game-container',backgroundColor:'#0e0c14',scene:[GameScene],scale:{mode:Phaser.Scale.NONE},input:{activePointers:4}});
});
</script>
</body>
</html>
