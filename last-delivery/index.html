<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Last Delivery — Proto v0.3</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #0a0a0a;
    overflow: hidden;
    touch-action: none;
    font-family: monospace;
  }

  #app {
    display: flex;
    flex-direction: column;
    width: 100%;
    /* dvh учитывает адресную строку и системные панели */
    height: 100dvh;
    height: 100vh; /* fallback */
  }

  /* ── ИГРОВАЯ ЗОНА ── */
  #game-container {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    position: relative;
  }

  #game-container canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }

  /* ── ПАНЕЛЬ УПРАВЛЕНИЯ ── */
  #controls {
    flex-shrink: 0;
    height: 150px;
    background: #080808;
    border-top: 1px solid #1e1408;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px 12px 16px;
    /* safe area для iPhone с чёлкой */
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }

  /* ── LEFT: Speed ── */
  #left-panel {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 72px;
  }

  .ui-label {
    font-size: 8px;
    letter-spacing: 4px;
    color: #3a2a18;
    text-transform: uppercase;
  }

  #speed-value {
    font-size: 38px;
    font-weight: bold;
    color: #fb923c;
    line-height: 1;
    letter-spacing: -2px;
    transition: color 0.2s;
  }

  #speed-unit {
    font-size: 9px;
    letter-spacing: 3px;
    color: #3a2a18;
  }

  #nitro-row {
    display: flex;
    gap: 5px;
    margin-top: 4px;
  }

  .nitro-pip {
    width: 22px;
    height: 8px;
    border-radius: 2px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    transition: all 0.2s;
  }

  .nitro-pip.on {
    background: #ff6b00;
    border-color: #ff9a00;
    box-shadow: 0 0 6px #ff6b0088;
  }

  /* ── CENTER: Multiplier ── */
  #center-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  #mult-value {
    font-size: 58px;
    font-weight: bold;
    color: #fb923c;
    line-height: 1;
    letter-spacing: -3px;
    transition: color 0.3s;
  }

  #mult-track {
    width: 80%;
    height: 3px;
    background: #1a1a1a;
    border-radius: 2px;
    overflow: hidden;
  }

  #mult-fill {
    height: 100%;
    background: linear-gradient(90deg, #fb923c, #ff2d55);
    width: 0%;
    transition: width 0.4s;
    border-radius: 2px;
  }

  /* ── RIGHT: одна кнопка GAS ── */
  #right-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  #btn-gas {
    width: 110px;
    height: 110px;
    border-radius: 22px;
    border: none;
    background: linear-gradient(160deg, #c45a00 0%, #7a3200 100%);
    color: #ffcc88;
    font-family: monospace;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    box-shadow:
      0 5px 0 #3a1500,
      0 0 30px rgba(251,146,60,0.15);
    border: 1px solid rgba(251,146,60,0.25);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    position: relative;
    overflow: hidden;
    transition: transform 0.08s, box-shadow 0.08s, background 0.1s;
  }

  #btn-gas::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 45%;
    background: rgba(255,255,255,0.06);
    border-radius: 22px 22px 0 0;
  }

  #btn-gas .gas-icon {
    font-size: 28px;
    line-height: 1;
    transition: transform 0.1s;
  }

  #btn-gas .gas-text {
    font-size: 10px;
    letter-spacing: 4px;
    opacity: 0.8;
  }

  #btn-gas.pressed {
    transform: translateY(3px);
    box-shadow: 0 2px 0 #3a1500, 0 0 50px rgba(251,146,60,0.45);
    background: linear-gradient(160deg, #ff8c00 0%, #c45a00 100%);
  }

  #btn-gas.pressed .gas-icon {
    transform: scale(1.15);
  }

  /* ── Capsules top bar ── */
  #capsules-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 28px;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2px;
    z-index: 100;
    pointer-events: none;
  }

  .cap {
    width: 10px;
    height: 16px;
    border-radius: 3px;
    background: #60a5fa;
    position: relative;
    transition: background 0.2s;
  }

  .cap.dead {
    background: #252535;
  }

  .cap::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 3px; height: 4px;
    background: rgba(255,255,255,0.3);
    border-radius: 1px;
  }

  /* ── Progress ── */
  #progress-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: #111;
    z-index: 100;
    pointer-events: none;
  }

  #progress-fill {
    height: 100%;
    background: #fb923c;
    width: 0%;
    transition: width 0.3s;
  }

  #version {
    position: absolute;
    bottom: 4px;
    left: 8px;
    font-size: 8px;
    letter-spacing: 2px;
    color: #1a1a1a;
    pointer-events: none;
    z-index: 50;
  }
</style>
</head>
<body>
<div id="app">

  <!-- ── ИГРОВАЯ ЗОНА ── -->
  <div id="game-container">
    <!-- Капсулы сверху -->
    <div id="capsules-bar">
      <!-- заполняется JS -->
    </div>
    <!-- Прогресс снизу -->
    <div id="progress-bar">
      <div id="progress-fill"></div>
    </div>
    <div id="version">LAST DELIVERY · v0.3 · PHASER 3</div>
  </div>

  <!-- ── ПАНЕЛЬ УПРАВЛЕНИЯ ── -->
  <div id="controls">

    <div id="left-panel">
      <div class="ui-label">Speed</div>
      <div id="speed-value">0</div>
      <div id="speed-unit">km/h</div>
      <div class="ui-label" style="margin-top:6px;">Nitro</div>
      <div id="nitro-row">
        <div class="nitro-pip on" id="n0"></div>
        <div class="nitro-pip on" id="n1"></div>
      </div>
    </div>

    <div id="center-panel">
      <div class="ui-label">Multiplier</div>
      <div id="mult-value">×1.0</div>
      <div id="mult-track"><div id="mult-fill"></div></div>
    </div>

    <div id="right-panel">
      <button id="btn-gas">
        <span class="gas-icon">▶▶</span>
        <span class="gas-text">GAS</span>
      </button>
    </div>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<script>
// ═══════════════════════════════
//  LAST DELIVERY  Proto v0.3
//  Одна кнопка: tap=едет, hold=быстрее, release=тормоз
// ═══════════════════════════════

const gc   = document.getElementById('game-container');
const W    = window.innerWidth;
const H    = gc.clientHeight || (window.innerHeight - 150);

// Горизонт — поднят выше (65% высоты канваса)
const GROUND_Y = H * 0.68;

const C = {
  road:      0x1c1a18,
  roadLine:  0x3a3530,
  ground:    0x2a1f0e,
  rust:      0x8b4513,
  rustL:     0xb5651d,
  rustD:     0x5c2d0a,
  wheel:     0x1a1a1a,
  rim:       0x4a4035,
  spoke:     0x5a5040,
  skin:      0xe8d5b0,
  shirt:     0xd4c49a,
  pants:     0x3d4a2f,
  boots:     0x2a1f10,
  helmet:    0x3a4a30,
  mask:      0x5a6a4a,
  goggle:    0x8b7355,
  exhaust:   0x666055,
  smoke:     0x7a6a5a,
  orange:    0xff6b00,
  blue:      0x60a5fa,
};

// ── UI refs ──
const elSpeed    = document.getElementById('speed-value');
const elMult     = document.getElementById('mult-value');
const elMultFill = document.getElementById('mult-fill');
const elN0       = document.getElementById('n0');
const elN1       = document.getElementById('n1');
const elProgFill = document.getElementById('progress-fill');
const elCapsBar  = document.getElementById('capsules-bar');
const btnGas     = document.getElementById('btn-gas');

// Инициализируем капсулы
function initCapsulesUI(n) {
  elCapsBar.innerHTML = '';
  for (let i = 0; i < 20; i++) {
    const d = document.createElement('div');
    d.className = 'cap' + (i < n ? '' : ' dead');
    d.id = 'cap' + i;
    elCapsBar.appendChild(d);
  }
}
initCapsulesUI(20);

// ── Одна кнопка GAS: holdTime накапливается ──
let gasHeld     = false;
let gasHoldTime = 0;   // сколько секунд держим

btnGas.addEventListener('touchstart', e => { e.preventDefault(); gasHeld = true;  btnGas.classList.add('pressed'); },   { passive: false });
btnGas.addEventListener('touchend',   e => { e.preventDefault(); gasHeld = false; gasHoldTime = 0; btnGas.classList.remove('pressed'); }, { passive: false });
btnGas.addEventListener('touchcancel',e => { e.preventDefault(); gasHeld = false; gasHoldTime = 0; btnGas.classList.remove('pressed'); }, { passive: false });
btnGas.addEventListener('mousedown',  () => { gasHeld = true;  btnGas.classList.add('pressed'); });
btnGas.addEventListener('mouseup',    () => { gasHeld = false; gasHoldTime = 0; btnGas.classList.remove('pressed'); });

class GameScene extends Phaser.Scene {
  constructor() { super('Game'); }

  create() {
    this.spd        = 0;
    this.maxSpd     = 300;
    this.accel      = 190;
    this.brakeF     = 260;
    this.friction   = 50;
    this.multiplier = 1.0;
    this.multTimer  = 0;
    this.multStep   = 5;
    this.capsules   = 20;
    this.nitro      = 2;
    this.nitroOn    = false;
    this.nitroTimer = 0;
    this.crashed    = false;
    this.crashTimer = 0;
    this.dist       = 0;
    this.levelLen   = 3000;
    this.shakeAmt   = 0;
    this.shakeX     = 0;
    this.shakeY     = 0;
    this.wAngle     = 0;
    this.finished   = false;
    this.dustP      = [];
    this.crashP     = [];

    this.createBG();
    this.roadGfx    = this.add.graphics();
    this.ptGfx      = this.add.graphics().setDepth(5);
    this.bikeC      = this.add.container(W * 0.24, GROUND_Y - 24);
    this.bikeGfx    = this.add.graphics();
    this.bikeC.add(this.bikeGfx);

    this.cursors = this.input.keyboard.createCursorKeys();
    this.keyX    = this.input.keyboard.addKey('X');
  }

  // ── Фон ──
  createBG() {
    const g = this.add.graphics();
    for (let i = 0; i < H; i++) {
      const t  = i / H;
      const r  = Math.round(0x1a + (0x30 - 0x1a) * Math.min(t * 1.6, 1));
      const gb = Math.round(0x1a * (1 - t * 0.6));
      g.fillStyle(Phaser.Display.Color.GetColor(r, gb, Math.round(gb * 0.5)));
      g.fillRect(0, i, W, 1);
    }
    g.fillStyle(0x8b3a00, 0.22);
    g.fillRect(0, H * 0.4, W, H * 0.28);

    this.b1 = this.add.graphics();
    this.b2 = this.add.graphics();
    this.b3 = this.add.graphics();
    this.drawBuildings(this.b1, 0.36, 0.10, 0x1a0f05, 0.55);
    this.drawBuildings(this.b2, 0.50, 0.18, 0x100804, 0.80);
    this.drawRuins(this.b3);
    this.bgL = [
      { g: this.b1, s: 0.08 },
      { g: this.b2, s: 0.18 },
      { g: this.b3, s: 0.32 },
    ];
  }

  drawBuildings(g, yb, hv, col, a) {
    g.fillStyle(col, a);
    for (let i = 0; i < 38; i++) {
      const x  = (i / 19) * W * 2 - W * 0.5;
      const bw = Phaser.Math.Between(26, 72);
      const bh = Phaser.Math.Between(H * 0.06, H * hv);
      const y  = H * yb - bh;
      g.fillRect(x, y, bw, bh);
      g.fillStyle(0xff6b00, 0.10);
      for (let wy = y+5; wy < H*yb-5; wy += 11) {
        for (let wx = x+3; wx < x+bw-3; wx += 9) {
          if (Math.random() > 0.52) g.fillRect(wx, wy, 4, 6);
        }
      }
      g.fillStyle(col, a);
    }
  }

  drawRuins(g) {
    g.fillStyle(0x0d0803, 0.93);
    const rs = [
      {x:0,    w:55, h:72},{x:62,  w:36,h:48},
      {x:135,  w:72, h:92},{x:245, w:30,h:40},
      {x:305,  w:65, h:78},{x:W-128,w:50,h:62},
      {x:W-70, w:66, h:85},
    ];
    rs.forEach(r => {
      const y = GROUND_Y - r.h;
      g.fillRect(r.x, y, r.w, r.h);
      g.fillStyle(0x1a1a2e, 1);
      for (let i=0;i<4;i++){
        const bx=r.x+i*(r.w/4);
        const bh=Phaser.Math.Between(4,15);
        g.fillTriangle(bx,y, bx+r.w/4,y, bx+r.w/8,y-bh);
      }
      g.fillStyle(0x0d0803, 0.93);
    });
  }

  drawRoad() {
    const g = this.roadGfx;
    g.clear();
    g.fillStyle(C.ground);
    g.fillRect(0, GROUND_Y+8, W, H-GROUND_Y);
    g.fillStyle(C.road);
    g.fillRect(0, GROUND_Y+6, W, 42);
    g.fillStyle(C.roadLine);
    const lw=25, gap=36;
    const off = (this.dist * 0.72) % (lw+gap);
    for (let x=-lw+off; x<W+lw; x+=lw+gap) {
      g.fillRect(x, GROUND_Y+24, lw, 3);
    }
    g.fillStyle(C.rustD);
    g.fillRect(0, GROUND_Y+6, W, 2);
  }

  drawBike() {
    const g = this.bikeGfx;
    g.clear();
    const wR=22, wF=32, wB=-54, aY=0, fY=-wR-2;

    // Рама
    g.lineStyle(6, C.rust);
    g.strokeRect(wB+10, fY-20, wF-wB-20, 20);
    g.lineStyle(5, C.rustL);
    g.beginPath(); g.moveTo(wB+18,fY); g.lineTo(-4,fY-28); g.strokePath();
    g.lineStyle(4,C.rustL);
    g.beginPath(); g.moveTo(wB+18,fY); g.lineTo(wB+18,aY); g.strokePath();
    g.lineStyle(4,C.rust);
    g.beginPath(); g.moveTo(-4,fY-28); g.lineTo(wF,aY); g.strokePath();
    g.beginPath(); g.moveTo(-4,fY-24); g.lineTo(wF,aY); g.strokePath();

    // Бак
    g.fillStyle(C.rustL);
    g.fillRoundedRect(-26,fY-34,50,20,7);
    g.fillStyle(C.rust);
    g.fillRoundedRect(-26,fY-34,50,9,{tl:7,tr:7,bl:0,br:0});
    g.fillStyle(C.rustD,0.5);
    g.fillEllipse(-8,fY-26,16,7);

    // Сиденье
    g.fillStyle(C.rustD);
    g.fillRoundedRect(wB+12,fY-38,44,11,4);

    // Мотор
    g.fillStyle(C.exhaust);
    g.fillRect(-18,fY-2,28,18);
    g.fillStyle(C.rustD);
    g.fillRect(-14,fY+1,20,13);

    // Выхлоп
    g.lineStyle(5,C.exhaust);
    g.beginPath(); g.moveTo(-16,fY+14); g.lineTo(wB+4,fY+17); g.lineTo(wB,aY+4); g.strokePath();

    // Руль
    g.fillStyle(C.rustD);
    g.fillRect(-10,fY-50,4,18);
    g.fillStyle(C.exhaust);
    g.fillRect(-18,fY-54,18,5);

    // Фара
    g.fillStyle(C.goggle);
    g.fillCircle(wF-1,fY-18,7);
    g.fillStyle(0xffcc44,0.25);
    g.fillCircle(wF-1,fY-18,4);

    // Колёса
    [wB,wF].forEach(wx => {
      g.lineStyle(10,C.wheel);
      g.strokeCircle(wx,aY,wR);
      g.lineStyle(1.5,C.spoke);
      for(let s=0;s<8;s++){
        const a=this.wAngle+(s/8)*Math.PI*2;
        g.beginPath();
        g.moveTo(wx,aY);
        g.lineTo(wx+Math.cos(a)*(wR-3),aY+Math.sin(a)*(wR-3));
        g.strokePath();
      }
      g.lineStyle(3,C.rim);
      g.strokeCircle(wx,aY,wR*0.52);
      g.fillStyle(C.exhaust); g.fillCircle(wx,aY,4);
      g.fillStyle(C.rustD);   g.fillCircle(wx,aY,2);
    });

    this.drawRay(g,fY);
  }

  drawRay(g,fY){
    const bx=-18, by=fY-36;
    g.fillStyle(C.shirt);
    g.fillRect(bx-7,by-26,17,28);
    g.fillStyle(C.rustD,0.3);
    g.fillEllipse(bx,by-18,5,3);
    g.fillStyle(C.pants);
    g.fillRect(bx-5,by+2,13,14);
    g.fillRect(bx+5,by+10,9,16);
    g.fillStyle(C.boots);
    g.fillRect(bx+3,by+24,14,7);
    g.fillStyle(C.skin);
    g.fillRect(bx+5,by-20,22,4);
    g.fillRect(bx+24,by-24,4,9);
    g.fillRect(bx-1,by-34,7,9);
    g.fillStyle(C.helmet);
    g.fillRoundedRect(bx-9,by-60,20,20,6);
    g.fillStyle(0xffffff,0.07);
    g.fillRoundedRect(bx-6,by-58,9,7,3);
    g.fillStyle(C.goggle);
    g.fillRoundedRect(bx-4,by-48,14,6,2);
    g.fillStyle(C.mask);
    g.fillRoundedRect(bx-5,by-42,16,11,3);
  }

  // ── Партикли ──
  spawnDust(){
    if(this.spd<30||Math.random()>0.35) return;
    this.dustP.push({
      x:this.bikeC.x-54, y:GROUND_Y+4,
      vx:Phaser.Math.FloatBetween(-20,-65),
      vy:Phaser.Math.FloatBetween(-15,-35),
      life:1.0, size:Phaser.Math.FloatBetween(2,5),
      col: this.nitroOn ? 0xff6b00 : C.smoke,
    });
  }

  triggerCrash(){
    if(this.crashed||this.finished) return;
    this.crashed=true; this.crashTimer=1.6;
    const loss=Math.min(Math.ceil(this.spd/55),8);
    this.capsules=Math.max(0,this.capsules-loss);
    this.multiplier=1.0; this.multTimer=0;
    this.shakeAmt=14; this.nitroOn=false; this.spd=0;
    gasHeld=false; gasHoldTime=0; btnGas.classList.remove('pressed');
    this.cameras.main.flash(180,244,63,94,false);
    for(let i=0;i<22;i++){
      const a=Math.random()*Math.PI*2;
      const f=Phaser.Math.FloatBetween(60,200);
      this.crashP.push({
        x:this.bikeC.x, y:GROUND_Y-20,
        vx:Math.cos(a)*f, vy:Math.sin(a)*f-85,
        life:1.0, size:Phaser.Math.FloatBetween(2,7),
        col:[C.rust,0xff6b00,C.rustL,0x333333][Math.floor(Math.random()*4)],
      });
    }
  }

  updateP(dt){
    this.dustP=this.dustP.filter(p=>{
      p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=55*dt; p.life-=dt*1.4; return p.life>0;
    });
    this.crashP=this.crashP.filter(p=>{
      p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=190*dt; p.life-=dt*1.1; return p.life>0;
    });
  }

  drawP(){
    const g=this.ptGfx; g.clear();
    this.dustP.forEach(p=>{
      g.fillStyle(p.col,p.life*0.4);
      g.fillCircle(p.x,p.y,p.size*p.life);
    });
    this.crashP.forEach(p=>{
      g.fillStyle(p.col,p.life);
      g.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
    });
  }

  updateUI(){
    const kmh=Math.round(this.spd*0.8);
    elSpeed.textContent=kmh;
    elSpeed.style.color = kmh>160?'#ff2d55':kmh>100?'#ffaa00':'#fb923c';

    elMult.textContent='×'+this.multiplier.toFixed(1);
    const mp=(this.multiplier-1.0)/2.0;
    elMultFill.style.width=(mp*100)+'%';
    elMult.style.color=this.multiplier>=3?'#ff2d55':this.multiplier>=2?'#ffaa00':this.multiplier>=1.5?'#ffcc44':'#fb923c';

    elN0.className='nitro-pip'+(this.nitro>=1?' on':'');
    elN1.className='nitro-pip'+(this.nitro>=2?' on':'');

    elProgFill.style.width=(Math.min(this.dist/this.levelLen,1)*100)+'%';

    // Капсулы
    for(let i=0;i<20;i++){
      const c=document.getElementById('cap'+i);
      if(c) c.className='cap'+(i<this.capsules?'':' dead');
    }
  }

  showFinish(){
    this.spd=0;
    const px=W/2-120, py=H/2-85;
    const p=this.add.graphics().setDepth(30);
    p.fillStyle(0x000000,0.88);
    p.fillRoundedRect(px,py,240,170,14);
    p.lineStyle(2,0x34d399);
    p.strokeRoundedRect(px,py,240,170,14);
    this.add.text(W/2,py+28,'DELIVERED!',{fontFamily:'monospace',fontSize:'22px',color:'#34d399',fontStyle:'bold'}).setOrigin(0.5).setDepth(31);
    const earned=Math.round(this.capsules*this.multiplier*10);
    this.add.text(W/2,py+62,`${this.capsules} × ×${this.multiplier.toFixed(1)} = ${earned} coins`,{fontFamily:'monospace',fontSize:'13px',color:'#fb923c'}).setOrigin(0.5).setDepth(31);
    const rb=this.add.text(W/2,py+130,'[ RESTART ]',{fontFamily:'monospace',fontSize:'15px',color:'#fb923c',fontStyle:'bold'}).setOrigin(0.5).setDepth(31).setInteractive();
    rb.on('pointerdown',()=>{ gasHeld=false; gasHoldTime=0; this.scene.restart(); });
    rb.on('pointerover',()=>rb.setColor('#ffcc44'));
    rb.on('pointerout', ()=>rb.setColor('#fb923c'));
  }

  update(time,delta){
    const dt=delta/1000;

    if(Phaser.Input.Keyboard.JustDown(this.keyX)) this.triggerCrash();

    // ── Обновляем время удержания кнопки ──
    if(gasHeld) gasHoldTime+=dt;
    else         gasHoldTime=0;

    // Газ также от клавиш
    const keyGas = this.cursors.right.isDown||this.cursors.up.isDown;
    const gas    = gasHeld||keyGas;

    if(this.crashed){
      this.crashTimer-=dt;
      if(this.crashTimer<=0) this.crashed=false;
      this.updateP(dt); this.drawP(); this.updateUI();
      return;
    }

    // ── Нитро — автоматически при долгом удержании ──
    if(gasHoldTime>2.5&&this.nitro>0&&!this.nitroOn){
      this.nitroOn=true; this.nitro--; this.nitroTimer=2.5;
      this.cameras.main.flash(100,251,146,60,false);
      this.time.delayedCall(15000,()=>{ if(this.nitro<2)this.nitro++; });
    }

    if(this.nitroOn){
      this.nitroTimer-=dt;
      if(this.nitroTimer<=0) this.nitroOn=false;
    }

    // ── Движение ──
    const nm = this.nitroOn?1.8:1.0;
    const cm = this.maxSpd*nm;

    if(gas){
      this.spd=Math.min(cm, this.spd+this.accel*nm*dt);
    } else {
      // Отпустили — тормозим
      this.spd=Math.max(0, this.spd-this.brakeF*dt);
    }

    this.dist+=this.spd*dt;

    // ── Множитель ──
    if(this.spd>70){
      this.multTimer+=dt;
      if(this.multTimer>=this.multStep){
        this.multTimer=0;
        this.multiplier=Math.min(3.0,this.multiplier+0.5);
      }
    } else if(this.spd<20&&this.multiplier>1.0){
      this.multiplier=Math.max(1.0,this.multiplier-0.3*dt);
    }

    // ── Shake ──
    if(this.shakeAmt>0){
      this.shakeX=(Math.random()-0.5)*this.shakeAmt*2;
      this.shakeY=(Math.random()-0.5)*this.shakeAmt*2;
      this.shakeAmt*=0.8;
      if(this.shakeAmt<0.4){this.shakeAmt=this.shakeX=this.shakeY=0;}
    }

    // ── Байк ──
    this.wAngle+=(this.spd/22)*dt;
    const bob=this.spd>8?Math.sin(time*0.009)*1.4:0;
    this.bikeC.y=GROUND_Y-24+bob+this.shakeY;
    this.bikeC.x=W*0.24+this.shakeX;
    const tilt=this.nitroOn?-0.065:gas?-0.03:0.02;
    this.bikeC.rotation=Phaser.Math.Linear(this.bikeC.rotation,tilt,0.1);

    // ── Параллакс ──
    this.bgL.forEach(l=>{ l.g.x=-((this.dist*l.s)%W); });

    this.drawRoad();
    this.drawBike();
    this.spawnDust();
    this.updateP(dt);
    this.drawP();
    this.updateUI();

    if(this.dist>=this.levelLen&&!this.finished){
      this.finished=true;
      this.showFinish();
    }
  }
}

// Ждём пока браузер посчитает высоту game-container
window.addEventListener('load', () => {
  const gcH = gc.clientHeight;
  new Phaser.Game({
    type: Phaser.AUTO,
    width: W,
    height: gcH,
    parent: 'game-container',
    backgroundColor: '#1a1a2e',
    scene: [GameScene],
    scale: { mode: Phaser.Scale.NONE },
    input: { activePointers: 4 },
  });
});
</script>
