<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Last Delivery — v0.7</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#050505; overflow:hidden; touch-action:none; font-family:monospace; }
  #app { display:flex; flex-direction:column; width:100%; height:100dvh; height:100vh; }
  #game-container { flex:1; min-height:0; overflow:hidden; position:relative; }
  #game-container canvas { display:block; width:100%!important; height:100%!important; }
  #capsules-bar {
    position:absolute; top:0; left:0; right:0; height:24px;
    background:rgba(0,0,0,0.5);
    display:flex; align-items:center; justify-content:center;
    gap:2px; z-index:100; pointer-events:none;
  }
  .cap { width:9px; height:14px; border-radius:3px; background:#60a5fa; position:relative; }
  .cap.dead { background:#1a1a28; }
  .cap::after { content:''; position:absolute; top:2px; left:2px; width:3px; height:3px; background:rgba(255,255,255,0.3); border-radius:1px; }
  /* ПАНЕЛЬ */
  #controls {
    flex-shrink:0; height:150px; background:#080808; border-top:1px solid #1a1008;
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 20px; padding-bottom:max(8px,env(safe-area-inset-bottom));
  }
  #speedo-wrap { display:flex; flex-direction:column; align-items:center; gap:2px; }
  #dist-val { font-size:10px; color:#2a1a08; letter-spacing:2px; text-align:center; }
  #btn-group { display:flex; align-items:flex-start; gap:10px; }
  #btn-gas {
    width:110px; height:110px; border-radius:50%;
    background:rgba(25,18,10,0.6); border:2px solid rgba(255,255,255,0.9);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    cursor:pointer; -webkit-tap-highlight-color:transparent; user-select:none;
    display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
    transition:background .07s, box-shadow .07s, transform .05s; flex-shrink:0;
  }
  #btn-gas::before {
    content:''; position:absolute; inset:0; border-radius:50%;
    background:radial-gradient(circle at 38% 32%, rgba(255,255,255,0.13) 0%, transparent 60%);
    pointer-events:none;
  }
  #btn-gas.pressed {
    background:rgba(251,146,60,0.22);
    box-shadow:0 0 28px rgba(251,146,60,0.55), inset 0 0 14px rgba(251,146,60,0.12);
    transform:scale(0.95); border-color:rgba(255,210,120,1);
  }
  #btn-gas svg { width:60px; height:60px; }
  /* NITRO — меньше на 17% от 68 = 56px */
  #btn-nitro {
    width:56px; height:56px; border-radius:50%;
    background:rgba(8,18,10,0.65); border:2px solid rgba(52,211,153,0.3);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    cursor:pointer; -webkit-tap-highlight-color:transparent; user-select:none;
    display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
    transition:border-color .3s, box-shadow .3s; flex-shrink:0;
  }
  #btn-nitro::before {
    content:''; position:absolute; inset:-2px; border-radius:50%;
    background:conic-gradient(rgba(52,211,153,0.85) var(--np,0%), rgba(15,35,18,0.5) var(--np,0%));
    pointer-events:none;
  }
  #btn-nitro::after { content:''; position:absolute; inset:3px; border-radius:50%; background:rgba(8,18,10,0.92); pointer-events:none; }
  #nitro-icon { position:relative; z-index:2; font-size:20px; line-height:1; opacity:0.18; transition:opacity .3s, filter .3s; pointer-events:none; }
  #btn-nitro.ready { border-color:rgba(52,211,153,0.9); box-shadow:0 0 14px rgba(52,211,153,0.5),0 0 28px rgba(52,211,153,0.2); animation:npulse .9s ease-in-out infinite alternate; }
  #btn-nitro.ready #nitro-icon { opacity:1; filter:drop-shadow(0 0 5px #ffd700) drop-shadow(0 0 10px #ff8800); }
  #btn-nitro.active { background:rgba(52,211,153,0.18); box-shadow:0 0 28px rgba(52,211,153,0.6); }
  #btn-nitro.active #nitro-icon { opacity:1; filter:drop-shadow(0 0 8px #ffd700) drop-shadow(0 0 18px #ffaa00); animation:lflash .12s ease-in-out infinite alternate; }
  @keyframes npulse { from{box-shadow:0 0 10px rgba(52,211,153,0.35);} to{box-shadow:0 0 24px rgba(52,211,153,0.75);} }
  @keyframes lflash { from{transform:scale(0.9) rotate(-5deg);} to{transform:scale(1.1) rotate(5deg);} }
  #version { position:absolute; bottom:3px; left:8px; font-size:7px; letter-spacing:2px; color:#111; pointer-events:none; z-index:50; }
</style>
</head>
<body>
<div id="app">
  <div id="game-container">
    <div id="capsules-bar"></div>
    <div id="version">LAST DELIVERY · v0.7 · PHYSICS TEST</div>
  </div>
  <div id="controls">
    <div id="speedo-wrap">
      <canvas id="speedo" width="108" height="108"></canvas>
      <div id="dist-val">0 m</div>
    </div>
    <div id="btn-group">
      <button id="btn-gas">
        <svg viewBox="0 0 60 60" fill="none">
          <rect x="6" y="25" width="48" height="10" rx="5" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
          <rect x="8" y="26.5" width="44" height="3" rx="1.5" fill="rgba(255,255,255,0.18)"/>
          <rect x="38" y="20" width="16" height="19" rx="4" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
          <line x1="42" y1="21" x2="42" y2="38" stroke="rgba(255,255,255,0.3)" stroke-width="1.1"/>
          <line x1="46" y1="21" x2="46" y2="38" stroke="rgba(255,255,255,0.3)" stroke-width="1.1"/>
          <line x1="50" y1="21" x2="50" y2="38" stroke="rgba(255,255,255,0.3)" stroke-width="1.1"/>
          <ellipse cx="54" cy="29.5" rx="2" ry="9" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
          <rect x="40" y="22" width="10" height="3" rx="1.5" fill="rgba(255,255,255,0.22)"/>
          <path d="M18 18 Q13 29.5 18 41" stroke="rgba(255,255,255,0.38)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          <path d="M15 37 L18 41 L23 38" stroke="rgba(255,255,255,0.38)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </button>
      <button id="btn-nitro"><span id="nitro-icon">⚡</span></button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<script>
const gc  = document.getElementById('game-container');
const W   = window.innerWidth;
const H   = gc.clientHeight || (window.innerHeight - 150);
const GY  = H * 0.72;          // горизонт земли
const BR  = GY - 26;           // Y покоя байка

// ══ Спидометр ══
const SC=document.getElementById('speedo'), sx=SC.getContext('2d');
const SR=52,SCX=54,SCY=54,SA=Math.PI*.75,SW=Math.PI*1.5;
function drawSpeedo(kmh){
  sx.clearRect(0,0,108,108);
  const g=sx.createRadialGradient(SCX,SCY,16,SCX,SCY,SR);
  g.addColorStop(0,'#111');g.addColorStop(1,'#050505');
  sx.beginPath();sx.arc(SCX,SCY,SR,0,Math.PI*2);sx.fillStyle=g;sx.fill();
  sx.beginPath();sx.arc(SCX,SCY,SR-1,0,Math.PI*2);sx.strokeStyle='rgba(255,255,255,0.1)';sx.lineWidth=1.5;sx.stroke();
  sx.beginPath();sx.arc(SCX,SCY,SR-9,SA,SA+SW);sx.strokeStyle='rgba(255,255,255,0.05)';sx.lineWidth=5;sx.stroke();
  const fr=Math.min(kmh/250,1);
  if(fr>0){sx.beginPath();sx.arc(SCX,SCY,SR-9,SA,SA+SW*fr);sx.strokeStyle=kmh>180?'#ff2d55':kmh>120?'#ffaa00':'#fb923c';sx.lineWidth=5;sx.stroke();}
  for(let i=0;i<=25;i++){const r=i/25,a=SA+SW*r,mj=i%5===0,r1=SR-16,r2=mj?SR-7:SR-11;sx.beginPath();sx.moveTo(SCX+Math.cos(a)*r1,SCY+Math.sin(a)*r1);sx.lineTo(SCX+Math.cos(a)*r2,SCY+Math.sin(a)*r2);sx.strokeStyle=mj?'rgba(255,255,255,0.7)':'rgba(255,255,255,0.18)';sx.lineWidth=mj?1.4:0.7;sx.stroke();}
  sx.font='bold 8px monospace';sx.textAlign='center';sx.textBaseline='middle';
  [0,50,100,150,200,250].forEach(v=>{const a=SA+SW*(v/250);sx.fillStyle=v>=200?'#ff2d55':'rgba(255,255,255,0.5)';sx.fillText(v,SCX+Math.cos(a)*(SR-22),SCY+Math.sin(a)*(SR-22));});
  const na=SA+SW*fr;sx.save();sx.translate(SCX,SCY);sx.rotate(na);
  sx.shadowColor='rgba(251,146,60,0.7)';sx.shadowBlur=5;
  sx.beginPath();sx.moveTo(-5,0);sx.lineTo(SR-14,0);sx.lineTo(SR-10,-1.2);sx.lineTo(SR-10,1.2);sx.closePath();sx.fillStyle='#fb923c';sx.fill();
  sx.shadowBlur=0;sx.beginPath();sx.moveTo(-5,0);sx.lineTo(-12,0);sx.strokeStyle='rgba(255,255,255,0.25)';sx.lineWidth=1.8;sx.stroke();sx.restore();
  sx.beginPath();sx.arc(SCX,SCY,4,0,Math.PI*2);sx.fillStyle='#222';sx.fill();
  sx.beginPath();sx.arc(SCX,SCY,2.5,0,Math.PI*2);sx.fillStyle='#fb923c';sx.fill();
  sx.font='bold 16px monospace';sx.textAlign='center';sx.textBaseline='middle';
  sx.fillStyle=kmh>180?'#ff2d55':kmh>120?'#ffaa00':'#fb923c';sx.fillText(kmh,SCX,SCY+20);
  sx.font='6px monospace';sx.fillStyle='rgba(255,255,255,0.22)';sx.fillText('km/h',SCX,SCY+30);
}
drawSpeedo(0);

// ══ UI ══
const elDist=document.getElementById('dist-val'),elCapsBar=document.getElementById('capsules-bar');
const btnGas=document.getElementById('btn-gas'),btnNitro=document.getElementById('btn-nitro');
function initCaps(n){elCapsBar.innerHTML='';for(let i=0;i<20;i++){const d=document.createElement('div');d.className='cap'+(i<n?'':' dead');d.id='cap'+i;elCapsBar.appendChild(d);}}
initCaps(20);

// ══ Touch ══
let gasHeld=false,nitroHeld=false,lastTap=0;
const DTAP=280;
function onGasDown(){const n=Date.now();if(n-lastTap<DTAP){window._gameScene&&window._gameScene.startJump();}lastTap=n;gasHeld=true;btnGas.classList.add('pressed');}
function onGasUp(){gasHeld=false;btnGas.classList.remove('pressed');}
function bindBtn(el,d,u){['touchstart','mousedown'].forEach(e=>el.addEventListener(e,ev=>{ev.preventDefault&&ev.preventDefault();d();},{passive:false}));['touchend','touchcancel','mouseup','mouseleave'].forEach(e=>el.addEventListener(e,ev=>{ev.preventDefault&&ev.preventDefault();u();},{passive:false}));}
bindBtn(btnGas,onGasDown,onGasUp);
bindBtn(btnNitro,()=>nitroHeld=true,()=>nitroHeld=false);

// ══ Генерация данных фона (одна плитка = W пикселей, seamless) ══
function seededRand(seed){return((seed*9301+49297)%233280)/233280;}
function genHills(){
  const hills=[];let x=0,s=42;
  while(x<W){hills.push({x,w:120+seededRand(s)*140,h:70+seededRand(s+1)*100});x+=80+seededRand(s+2)*100;s+=3;}
  return hills;
}
function genFarBuilds(){
  const b=[];let x=0,s=7;
  while(x<W){b.push({x,w:16+seededRand(s)*52,h:H*(.04+seededRand(s+1)*.10),broken:seededRand(s+2)>.5});x+=2+seededRand(s+3)*18;s+=4;}
  return b;
}
function genMidItems(){
  const items=[];let x=4,s=99;
  while(x<W){
    const t=seededRand(s)>.35?'ruin':'pylon';
    const w=t==='ruin'?30+seededRand(s+1)*50:20+seededRand(s+1)*18;
    const h=t==='ruin'?45+seededRand(s+2)*60:70+seededRand(s+2)*60;
    items.push({x,t,w,h});x+=20+seededRand(s+3)*80;s+=4;
  }
  return items;
}
function genNearRuins(){
  const r=[];let x=0,s=199;
  while(x<W){r.push({x,w:24+seededRand(s)*46,h:30+seededRand(s+1)*50});x+=30+seededRand(s+2)*80;s+=3;}
  return r;
}
function genCobbles(density){
  const c=[];let x=0,s=333;
  while(x<W){
    c.push({x,y:GY+8+seededRand(s)*30,w:14+seededRand(s+1)*22,h:7+seededRand(s+2)*10,sh:Math.floor(seededRand(s+3)*5)});
    x+=2+seededRand(s+4)*(density?6:14);s+=5;
  }
  return c;
}

// ══ Цвета ══
const DARKS=[0x0a0806,0x0c0908,0x0e0b08,0x100c09,0x12100a,0x14110b];
const C={rustD:0x5c2d0a,rust:0x8b4513,rustL:0xb5651d,wheel:0x1a1a1a,rim:0x4a4035,spoke:0x5a5040,skin:0xe8d5b0,shirt:0xd4c49a,pants:0x3d4a2f,boots:0x2a1f10,helmet:0x3a4a30,mask:0x5a6a4a,goggle:0x8b7355,exhaust:0x666055};

class GameScene extends Phaser.Scene{
  constructor(){super('Game');}

  create(){
    window._gameScene=this;
    // Физика
    this.spd=0;this.maxSpd=300;this.accel=195;this.brakeF=650;
    this.multiplier=1.0;this.multTimer=0;this.multStep=5;
    this.capsules=20;
    this.nitroPct=0;this.nitroOn=false;this.nitroTimer=0;this.nitroReady=false;
    this.crashed=false;this.crashTimer=0;
    this.dist=0;
    this.shakeAmt=0;this.shakeX=0;this.shakeY=0;
    this.wAngle=0;
    this.dustP=[];this.crashP=[];
    // Прыжок
    this.bikeBaseY=BR;this.bikeVY=0;this.onGround=true;
    this.jumpPhase='none'; // 'wheelie','air','landing'
    this.jumpTimer=0;
    this.targetRot=0;

    // Данные фона (одна плитка W)
    this.dHills    = genHills();
    this.dFarB     = genFarBuilds();
    this.dMid      = genMidItems();
    this.dNear     = genNearRuins();
    this.dCobblesA = genCobbles(true);   // ближние
    this.dCobblesB = genCobbles(false);  // дальние

    this.createSky();
    // Статичные фоны — рисуем раз, потом скроллим x
    this.gHills = this.add.graphics().setDepth(1); this.paintHills();
    this.gFarB  = this.add.graphics().setDepth(2); this.paintFarB();
    this.gMid   = this.add.graphics().setDepth(3); this.paintMid();
    this.gNear  = this.add.graphics().setDepth(4); this.paintNear();
    this.gGround= this.add.graphics().setDepth(5);
    this.gPt    = this.add.graphics().setDepth(9);

    this.bikeC  = this.add.container(W*.24,BR).setDepth(10);
    this.bikeG  = this.add.graphics();
    this.bikeC.add(this.bikeG);

    // Параллакс слои
    this.bgL=[
      {g:this.gHills, s:.028},
      {g:this.gFarB,  s:.07},
      {g:this.gMid,   s:.18},
      {g:this.gNear,  s:.38},
    ];

    this.cursors=this.input.keyboard.createCursorKeys();
    this.keyX=this.input.keyboard.addKey('X');
    this.keyN=this.input.keyboard.addKey('N');
    this.keySpace=this.input.keyboard.addKey('SPACE');
  }

  // ══ НЕБО: тёмный градиент + тонкое зарево снизу (25%) ══
  createSky(){
    const g=this.add.graphics().setDepth(0);
    // Верх — очень тёмный синевато-серый
    for(let i=0;i<H*.75;i++){
      const t=i/(H*.75);
      const r=Math.round(0x08+0x0a*t);
      const gv=Math.round(0x06+0x06*t);
      const b=Math.round(0x0a+0x08*t);
      g.fillStyle(Phaser.Display.Color.GetColor(r,gv,b));
      g.fillRect(0,i,W,1);
    }
    // Нижние 25% — яркое оранжево-красное зарево (тонкое)
    const glowTop=H*.75, glowH=H*.25;
    for(let i=0;i<glowH;i++){
      const t=i/glowH;
      // от тёмного к яркому ближе к горизонту
      const r=Math.round(Phaser.Math.Linear(0x12,0x8b,t));
      const gv=Math.round(Phaser.Math.Linear(0x06,0x28,t));
      const b=Math.round(Phaser.Math.Linear(0x08,0x04,t));
      g.fillStyle(Phaser.Display.Color.GetColor(r,gv,b));
      g.fillRect(0,glowTop+i,W,1);
    }
    // Пик зарева у самого горизонта — яркая тонкая полоска
    g.fillStyle(0xb54a00,.45);g.fillRect(0,GY-12,W,10);
    g.fillStyle(0xff6b00,.20);g.fillRect(0,GY-6,W,6);
    g.fillStyle(0xff9a00,.10);g.fillRect(0,GY-3,W,3);
  }

  // ══ РИСУЕМ ФОНОВЫЕ СЛОИ (2 плитки для seamless) ══
  paintHills(){
    const g=this.gHills;g.clear();
    [0,W].forEach(off=>{
      this.dHills.forEach(h=>{
        const by=GY+2,x=h.x+off;
        g.fillStyle(0x050302,.55);g.fillTriangle(x,by,x+h.w,by,x+h.w/2+10,by-h.h+12);
        g.fillStyle(0x0c0805,.82);g.fillTriangle(x,by,x+h.w,by,x+h.w/2,by-h.h);
        g.fillStyle(0x181008,.32);g.fillTriangle(x+h.w/2,by-h.h,x+h.w*.58,by,x+h.w*.84,by);
      });
    });
  }

  paintFarB(){
    const g=this.gFarB;g.clear();
    [0,W].forEach(off=>{
      this.dFarB.forEach((b,i)=>{
        const x=b.x+off,y=H*.43-b.h,dc=DARKS[i%DARKS.length];
        g.fillStyle(dc,.75);g.fillRect(x,y,b.w,b.h);
        // Окна
        g.fillStyle(0xff6b00,.07);
        for(let wy=y+4;wy<H*.43-4;wy+=10)for(let wx=x+2;wx<x+b.w-2;wx+=8)if(seededRand(i*7+wx+wy)>.55)g.fillRect(wx,wy,3,5);
        // Сломанная верхушка
        if(b.broken){g.fillStyle(0x1a1a2e,1);g.fillTriangle(x,y,x+b.w*.4,y,x+b.w*.2,y-8);}
        g.fillStyle(dc,.75);
      });
    });
  }

  paintMid(){
    const g=this.gMid;g.clear();
    [0,W].forEach(off=>{
      this.dMid.forEach(it=>{
        const x=it.x+off;
        if(it.t==='ruin'){
          const y=GY-it.h;
          g.fillStyle(0x0d0908,.88);g.fillRect(x,y,it.w,it.h);
          g.fillStyle(0x1a1a2e,1);
          for(let i=0;i<3;i++){const bx=x+i*(it.w/3),bh=8+Math.floor(seededRand(it.x+i)*12);g.fillTriangle(bx,y,bx+it.w/3,y,bx+it.w/6,y-bh);}
          // окна
          g.fillStyle(0xff6b00,.09);
          for(let wy=y+8;wy<GY-8;wy+=13)for(let wx=x+4;wx<x+it.w-4;wx+=10)if(seededRand(wx*wy)>.42)g.fillRect(wx,wy,5,7);
          g.fillStyle(0x0d0908,.88);
        } else {
          const mx=x+it.w/2,topY=GY-it.h;
          g.lineStyle(3,0x0e0b08,.88);
          g.beginPath();g.moveTo(x,GY);g.lineTo(mx-4,topY);g.strokePath();
          g.beginPath();g.moveTo(x+it.w,GY);g.lineTo(mx+4,topY);g.strokePath();
          g.lineStyle(2,0x0e0b08,.65);
          for(let f=.2;f<.9;f+=.2){const ly=GY-it.h*f,lx1=x+(mx-x)*f-3,lx2=(x+it.w)+(mx-x-it.w)*f+3;g.beginPath();g.moveTo(lx1,ly);g.lineTo(lx2,ly);g.strokePath();}
          // Сломанная верхушка
          const ba=(seededRand(it.x)-.5)*.7;
          g.lineStyle(2.5,0x0e0b08,.8);g.beginPath();g.moveTo(mx,topY);g.lineTo(mx+Math.sin(ba)*25,topY-Math.cos(ba)*20);g.strokePath();
        }
      });
    });
  }

  paintNear(){
    const g=this.gNear;g.clear();
    [0,W].forEach(off=>{
      this.dNear.forEach(r=>{
        const x=r.x+off,y=GY-r.h;
        g.fillStyle(0x090705,.95);g.fillRect(x,y,r.w,r.h);
        g.fillStyle(0x1a1a2e,1);
        for(let i=0;i<3;i++){const bx=x+i*(r.w/3),bh=4+Math.floor(seededRand(r.x*i+7)*10);g.fillTriangle(bx,y,bx+r.w/3,y,bx+r.w/6,y-bh);}
        g.fillStyle(0x090705,.95);
      });
    });
  }

  // ══ ЗЕМЛЯ + БУЛЫЖНИКИ (seamless) ══
  drawGround(){
    const g=this.gGround;g.clear();
    g.fillStyle(0x18130a);g.fillRect(0,GY+6,W,H-GY);
    g.fillStyle(0x22190c);g.fillRect(0,GY+5,W,3);

    const sf=.5+this.spd/this.maxSpd*2.0;
    const scrollA=((this.dist*.9*sf)%W);
    const scrollB=((this.dist*.4*sf)%W);

    // Рисуем 2 плитки для каждого набора
    [0,W].forEach(rep=>{
      this.dCobblesB.forEach(s=>{
        const sx=s.x+rep-scrollB;
        if(sx>W+40||sx+s.w<-20)return;
        const shade=0x1c1610+s.sh*0x010100;
        g.fillStyle(shade,.62);g.fillRoundedRect(sx,s.y+16,s.w*.65,s.h*.5,2);
        g.fillStyle(0x28200f,.22);g.fillRect(sx+1,s.y+16,s.w*.65-2,1.5);
      });
      this.dCobblesA.forEach(s=>{
        const sx=s.x+rep-scrollA;
        if(sx>W+50||sx+s.w<-30)return;
        const shade=0x22180e+s.sh*0x020200;
        g.fillStyle(shade,.87);g.fillRoundedRect(sx,s.y,s.w,s.h,3);
        g.fillStyle(0x382c1a,.42);g.fillRect(sx+2,s.y+1,s.w-4,2);
        g.fillStyle(0x080604,.32);g.fillRect(sx+1,s.y+s.h-2,s.w-2,2);
      });
    });
  }

  // ══ БАЙК ══
  drawBike(){
    const g=this.bikeG;g.clear();
    const wR=22,wF=32,wB=-54,aY=0,fY=-wR-2;
    g.lineStyle(6,C.rust);g.strokeRect(wB+10,fY-20,wF-wB-20,20);
    g.lineStyle(5,C.rustL);g.beginPath();g.moveTo(wB+18,fY);g.lineTo(-4,fY-28);g.strokePath();
    g.lineStyle(4,C.rustL);g.beginPath();g.moveTo(wB+18,fY);g.lineTo(wB+18,aY);g.strokePath();
    g.lineStyle(4,C.rust);g.beginPath();g.moveTo(-4,fY-28);g.lineTo(wF,aY);g.strokePath();g.beginPath();g.moveTo(-4,fY-24);g.lineTo(wF,aY);g.strokePath();
    g.fillStyle(C.rustL);g.fillRoundedRect(-26,fY-34,50,20,7);g.fillStyle(C.rust);g.fillRoundedRect(-26,fY-34,50,9,{tl:7,tr:7,bl:0,br:0});
    g.fillStyle(C.rustD,.5);g.fillEllipse(-8,fY-26,16,7);
    g.fillStyle(C.rustD);g.fillRoundedRect(wB+12,fY-38,44,11,4);
    g.fillStyle(C.exhaust);g.fillRect(-18,fY-2,28,18);g.fillStyle(C.rustD);g.fillRect(-14,fY+1,20,13);
    g.lineStyle(5,C.exhaust);g.beginPath();g.moveTo(-16,fY+14);g.lineTo(wB+4,fY+17);g.lineTo(wB,aY+4);g.strokePath();
    if(this.nitroOn){const t=this.time.now;g.fillStyle(0xff8800,.65+Math.sin(t*.028)*.28);g.fillEllipse(wB-10,aY+4,22+Math.sin(t*.045)*7,10);g.fillStyle(0xffff00,.3);g.fillEllipse(wB-17,aY+4,13,6);}
    g.fillStyle(C.rustD);g.fillRect(-10,fY-50,4,18);g.fillStyle(C.exhaust);g.fillRect(-18,fY-54,18,5);
    g.fillStyle(C.goggle);g.fillCircle(wF-1,fY-18,7);g.fillStyle(0xffcc44,.2);g.fillCircle(wF-1,fY-18,4);
    [wB,wF].forEach(wx=>{
      g.lineStyle(10,C.wheel);g.strokeCircle(wx,aY,wR);
      g.lineStyle(1.5,C.spoke);
      for(let s=0;s<8;s++){const a=this.wAngle+(s/8)*Math.PI*2;g.beginPath();g.moveTo(wx,aY);g.lineTo(wx+Math.cos(a)*(wR-3),aY+Math.sin(a)*(wR-3));g.strokePath();}
      g.lineStyle(3,C.rim);g.strokeCircle(wx,aY,wR*.52);
      g.fillStyle(C.exhaust);g.fillCircle(wx,aY,4);g.fillStyle(C.rustD);g.fillCircle(wx,aY,2);
    });
    this.drawRay(g,fY);
  }

  drawRay(g,fY){
    const bx=-18,by=fY-36;
    g.fillStyle(C.shirt);g.fillRect(bx-7,by-26,17,28);g.fillStyle(C.rustD,.28);g.fillEllipse(bx,by-18,5,3);
    g.fillStyle(C.pants);g.fillRect(bx-5,by+2,13,14);g.fillRect(bx+5,by+10,9,16);
    g.fillStyle(C.boots);g.fillRect(bx+3,by+24,14,7);
    g.fillStyle(C.skin);g.fillRect(bx+5,by-20,22,4);g.fillRect(bx+24,by-24,4,9);g.fillRect(bx-1,by-34,7,9);
    g.fillStyle(C.helmet);g.fillRoundedRect(bx-9,by-60,20,20,6);
    g.fillStyle(0xffffff,.07);g.fillRoundedRect(bx-6,by-58,9,7,3);
    g.fillStyle(C.goggle);g.fillRoundedRect(bx-4,by-48,14,6,2);
    g.fillStyle(C.mask);g.fillRoundedRect(bx-5,by-42,16,11,3);
  }

  // ══ ПРЫЖОК — "КОЗА" ══
  startJump(){
    if(!this.onGround||this.crashed||this.jumpPhase!=='none') return;
    this.jumpPhase='wheelie';
    this.jumpTimer=0.22;  // время вставания на заднее колесо
  }

  updateJump(dt){
    switch(this.jumpPhase){
      case 'wheelie':
        // Байк встаёт на заднее колесо — нос задирается
        this.jumpTimer-=dt;
        this.targetRot=-0.62;  // сильный наклон назад
        // Небольшой откат назад как при реальном вили
        this.bikeC.x=Phaser.Math.Linear(this.bikeC.x, W*.22, .08);
        if(this.jumpTimer<=0){
          // ОТРЫВ
          this.bikeVY=-520;
          this.onGround=false;
          this.jumpPhase='rising';
        }
        break;

      case 'rising':
        // Летим вверх — нос постепенно опускается
        this.targetRot=Phaser.Math.Linear(this.targetRot,-0.25,.04);
        this.bikeBaseY+=this.bikeVY*dt;
        this.bikeVY+=950*dt;  // гравитация
        if(this.bikeVY>=0) this.jumpPhase='falling';
        if(this.bikeBaseY>=BR){this.bikeBaseY=BR;this.bikeVY=0;this.onGround=true;this.jumpPhase='landing';this.jumpTimer=.18;}
        break;

      case 'falling':
        // Падаем — нос наклоняется вперёд для приземления
        this.targetRot=Phaser.Math.Linear(this.targetRot,0.14,.05);
        this.bikeBaseY+=this.bikeVY*dt;
        this.bikeVY+=950*dt;
        if(this.bikeBaseY>=BR){
          this.bikeBaseY=BR;this.bikeVY=0;this.onGround=true;
          this.jumpPhase='landing';this.jumpTimer=.20;
          // Удар о землю — shake
          this.shakeAmt=6;
        }
        break;

      case 'landing':
        // Приземление — байк возвращается
        this.jumpTimer-=dt;
        this.targetRot=Phaser.Math.Linear(this.targetRot,0.04,.12);
        if(this.jumpTimer<=0){this.jumpPhase='none';this.targetRot=0;}
        break;

      default:
        break;
    }
  }

  spawnDust(){
    if(this.spd<20||Math.random()>.3) return;
    this.dustP.push({x:this.bikeC.x-54,y:GY+5,vx:Phaser.Math.FloatBetween(-14,-52),vy:Phaser.Math.FloatBetween(-8,-26),life:1,size:Phaser.Math.FloatBetween(2,5),col:this.nitroOn?0xff8800:0x6a5a4a});
  }

  triggerCrash(){
    if(this.crashed) return;
    this.crashed=true;this.crashTimer=1.5;
    const loss=Math.min(Math.ceil(this.spd/50),8);
    this.capsules=Math.max(0,this.capsules-loss);
    this.multiplier=1;this.multTimer=0;this.shakeAmt=16;this.nitroOn=false;this.spd=0;
    this.bikeBaseY=BR;this.bikeVY=0;this.onGround=true;this.jumpPhase='none';this.targetRot=0;
    gasHeld=false;btnGas.classList.remove('pressed');
    this.cameras.main.flash(160,244,63,94,false);
    for(let i=0;i<22;i++){const a=Math.random()*Math.PI*2,f=Phaser.Math.FloatBetween(70,210);this.crashP.push({x:this.bikeC.x,y:GY-22,vx:Math.cos(a)*f,vy:Math.sin(a)*f-90,life:1,size:Phaser.Math.FloatBetween(2,7),col:[C.rust,0xff6b00,C.rustL,0x1a1a1a][Math.floor(Math.random()*4)]});}
  }

  activateNitro(){
    if(this.nitroPct<100||this.nitroOn||this.crashed) return;
    this.nitroOn=true;this.nitroTimer=3;this.nitroPct=0;this.nitroReady=false;
    btnNitro.classList.remove('ready');btnNitro.classList.add('active');
    this.cameras.main.flash(80,52,211,153,false);
  }

  updateParticles(dt){
    this.dustP=this.dustP.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=50*dt;p.life-=dt*1.3;return p.life>0;});
    this.crashP=this.crashP.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=180*dt;p.life-=dt;return p.life>0;});
  }
  drawParticles(){
    const g=this.gPt;g.clear();
    this.dustP.forEach(p=>{g.fillStyle(p.col,p.life*.38);g.fillCircle(p.x,p.y,p.size*p.life);});
    this.crashP.forEach(p=>{g.fillStyle(p.col,p.life);g.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);});
  }

  updateUI(){
    const kmh=Math.round(this.spd*.8);
    drawSpeedo(kmh);
    elDist.textContent=Math.round(this.dist)+' m';
    for(let i=0;i<20;i++){const c=document.getElementById('cap'+i);if(c)c.className='cap'+(i<this.capsules?'':' dead');}
    btnNitro.style.setProperty('--np',this.nitroPct.toFixed(1)+'%');
    if(this.nitroOn){btnNitro.classList.add('active');btnNitro.classList.remove('ready');}
    else if(this.nitroPct>=100){btnNitro.classList.add('ready');btnNitro.classList.remove('active');}
    else{btnNitro.classList.remove('ready','active');}
  }

  update(time,delta){
    const dt=delta/1000;
    if(Phaser.Input.Keyboard.JustDown(this.keyX)) this.triggerCrash();
    if(Phaser.Input.Keyboard.JustDown(this.keyN)) this.activateNitro();
    if(Phaser.Input.Keyboard.JustDown(this.keySpace)) this.startJump();

    const gas=gasHeld||this.cursors.right.isDown||this.cursors.up.isDown;

    if(this.crashed){
      this.crashTimer-=dt;if(this.crashTimer<=0)this.crashed=false;
      this.updateParticles(dt);this.drawParticles();this.drawGround();this.updateUI();return;
    }

    // Нитро
    if(this.nitroOn){this.nitroTimer-=dt;if(this.nitroTimer<=0){this.nitroOn=false;btnNitro.classList.remove('active');}}
    if(nitroHeld&&this.nitroPct>=100) this.activateNitro();

    // Движение
    const nm=this.nitroOn?1.8:1;
    const cm=this.maxSpd*nm;
    if(gas)this.spd=Math.min(cm,this.spd+this.accel*nm*dt);
    else    this.spd=Math.max(0,this.spd-this.brakeF*dt);
    this.dist+=this.spd*dt;

    // Нитро заряд
    if(this.spd>15&&!this.nitroOn){this.nitroPct=Math.min(100,this.nitroPct+(this.spd/this.maxSpd)*16*dt);if(this.nitroPct>=100)this.nitroReady=true;}

    // Прыжок
    this.updateJump(dt);

    // Shake
    if(this.shakeAmt>0){this.shakeX=(Math.random()-.5)*this.shakeAmt*2;this.shakeY=(Math.random()-.5)*this.shakeAmt*2;this.shakeAmt*=.78;if(this.shakeAmt<.4){this.shakeAmt=this.shakeX=this.shakeY=0;}}

    // Позиция байка
    this.wAngle+=(this.spd/22)*dt;
    const bob=this.onGround&&this.spd>8?Math.sin(time*.009)*1.4:0;
    this.bikeC.y=this.bikeBaseY+bob+this.shakeY;
    // X — только во время вили немного смещается, потом возвращается
    if(this.jumpPhase==='none'||this.jumpPhase==='landing'){
      this.bikeC.x=Phaser.Math.Linear(this.bikeC.x,W*.24+this.shakeX,.1);
    }

    // Вращение
    let rotTarget=this.targetRot;
    if(this.jumpPhase==='none'){
      rotTarget=this.nitroOn?-.08:gas?-.03:.015;
    }
    this.bikeC.rotation=Phaser.Math.Linear(this.bikeC.rotation,rotTarget,.12);

    // Параллакс — скорость зависит от this.spd
    const pSpeed=.3+this.spd/this.maxSpd*.7; // от 0.3x до 1.0x
    this.bgL.forEach(l=>{l.g.x=-((this.dist*l.s*pSpeed)%W);});

    this.drawGround();this.drawBike();this.spawnDust();this.updateParticles(dt);this.drawParticles();this.updateUI();
  }
}

window.addEventListener('load',()=>{
  const gcH=gc.clientHeight||window.innerHeight-150;
  new Phaser.Game({type:Phaser.AUTO,width:W,height:gcH,parent:'game-container',backgroundColor:'#080608',scene:[GameScene],scale:{mode:Phaser.Scale.NONE},input:{activePointers:4}});
});
</script>
