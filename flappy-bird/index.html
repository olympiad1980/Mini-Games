<title>Flappy Chick</title>

<canvas id="gc"></canvas>
<script>
const canvas=document.getElementById("gc");
const ctx=canvas.getContext("2d");
const W=360,H=620;
let scale=1;
function resize(){
  const s=Math.min(window.innerWidth/W,window.innerHeight/H);
  scale=s;canvas.width=Math.round(W*s);canvas.height=Math.round(H*s);
  canvas.style.width=canvas.width+"px";canvas.style.height=canvas.height+"px";
}
resize();
window.addEventListener("resize",resize);
const rand=(a,b)=>Math.random()*(b-a)+a;
const lerp=(a,b,t)=>a+(b-a)*t;
const easeOut=t=>1-Math.pow(1-t,3);

const PHASES=[
  {gravity:0.26, jump:-5.8, pspeed:2.0, pint:1900},  // 0-9:  easy start
  {gravity:0.30, jump:-6.4, pspeed:2.3, pint:1750},  // 10+:  slight bump
  {gravity:0.34, jump:-7.0, pspeed:2.65,pint:1600},  // 20+:  medium
  {gravity:0.38, jump:-7.6, pspeed:3.0, pint:1480},  // 30+:  fast
];
function getPhase(sc){return sc>=30?3:sc>=20?2:sc>=10?1:0;}
const PGAP=185,PW=56,GH=78,BX=88;

// ── Sprites ───────────────────────────────────────
// Three wing positions for animation
const birdMid  = new Image(), birdUp   = new Image(), birdDown = new Image();
let midLoaded=false, upLoaded=false, downLoaded=false;

function removeBg(img, cb){
  const sz=256, tmp=document.createElement("canvas");
  tmp.width=tmp.height=sz;
  const t=tmp.getContext("2d");
  t.drawImage(img,0,0,sz,sz);
  const id=t.getImageData(0,0,sz,sz), d=id.data;
  for(let i=0;i<d.length;i+=4){
    const br=(d[i]+d[i+1]+d[i+2])/3;
    if(br<15)d[i+3]=0;
    else if(br<48)d[i+3]=Math.round((br-15)/33*255);
  }
  t.putImageData(id,0,0);
  cb(tmp);
}
let chickMid=null, chickUp=null, chickDown=null;
birdMid.onload  = ()=>removeBg(birdMid,  c=>{chickMid=c;  midLoaded=true});
birdUp.onload   = ()=>removeBg(birdUp,   c=>{chickUp=c;   upLoaded=true});
birdDown.onload = ()=>removeBg(birdDown, c=>{chickDown=c; downLoaded=true});

// ── Audio Engine ──────────────────────────────────
let AC=null,bgGain=null,bgPlaying=false,bgNodes=[];
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==="suspended")AC.resume();return AC;}
function getBgGain(){if(!bgGain){bgGain=getAC().createGain();bgGain.gain.value=0.16;bgGain.connect(AC.destination);}return bgGain;}
function playTone(freq,type,vol,start,duration,ac,dest){
  const o=ac.createOscillator(),g=ac.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,start);g.gain.exponentialRampToValueAtTime(0.001,start+duration);
  o.connect(g);g.connect(dest);o.start(start);o.stop(start+duration+0.01);
}
function sfxFlap(){
  const ac=getAC(),t=ac.currentTime;
  const o=ac.createOscillator(),g=ac.createGain();
  o.type="sine";o.frequency.setValueAtTime(420,t);o.frequency.exponentialRampToValueAtTime(280,t+0.08);
  g.gain.setValueAtTime(0.22,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.09);
  o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+0.1);
}
function sfxScore(){
  const ac=getAC(),t=ac.currentTime;
  [[660,0],[880,0.06],[1100,0.11]].forEach(([f,dt])=>playTone(f,"sine",0.18,t+dt,0.09,ac,ac.destination));
}
function sfxStart(){
  const ac=getAC(),t=ac.currentTime;
  [[330,0],[440,0.1],[550,0.2],[660,0.3]].forEach(([f,dt])=>playTone(f,"triangle",0.2,t+dt,0.15,ac,ac.destination));
}
function sfxDeath(){
  const ac=getAC(),t=ac.currentTime;
  const o1=ac.createOscillator(),g1=ac.createGain();
  o1.type="sine";o1.frequency.setValueAtTime(2200,t);o1.frequency.exponentialRampToValueAtTime(800,t+0.06);
  o1.frequency.exponentialRampToValueAtTime(1600,t+0.1);o1.frequency.exponentialRampToValueAtTime(600,t+0.18);
  g1.gain.setValueAtTime(0.0,t);g1.gain.linearRampToValueAtTime(0.38,t+0.01);g1.gain.exponentialRampToValueAtTime(0.001,t+0.22);
  o1.connect(g1);g1.connect(ac.destination);o1.start(t);o1.stop(t+0.25);
  const o2=ac.createOscillator(),g2=ac.createGain();
  o2.type="sine";o2.frequency.setValueAtTime(1800,t+0.15);o2.frequency.exponentialRampToValueAtTime(500,t+0.32);
  o2.frequency.exponentialRampToValueAtTime(1200,t+0.36);o2.frequency.exponentialRampToValueAtTime(400,t+0.46);
  g2.gain.setValueAtTime(0.0,t+0.15);g2.gain.linearRampToValueAtTime(0.28,t+0.17);g2.gain.exponentialRampToValueAtTime(0.001,t+0.50);
  o2.connect(g2);g2.connect(ac.destination);o2.start(t+0.15);o2.stop(t+0.55);
  const lfo=ac.createOscillator(),lfoG=ac.createGain();
  lfo.frequency.value=28;lfoG.gain.value=120;lfo.connect(lfoG);lfoG.connect(o1.frequency);lfo.start(t);lfo.stop(t+0.25);
  const o3=ac.createOscillator(),g3=ac.createGain();
  o3.type="triangle";o3.frequency.setValueAtTime(180,t+0.05);o3.frequency.exponentialRampToValueAtTime(60,t+0.35);
  g3.gain.setValueAtTime(0.28,t+0.05);g3.gain.exponentialRampToValueAtTime(0.001,t+0.38);
  o3.connect(g3);g3.connect(ac.destination);o3.start(t+0.05);o3.stop(t+0.4);
}
function sfxMilestone(){
  const ac=getAC(),t=ac.currentTime;
  [[523,0],[659,0.1],[784,0.2],[1047,0.32]].forEach(([f,dt])=>{
    playTone(f,"square",0.15,t+dt,0.18,ac,ac.destination);
    playTone(f*2,"sine",0.07,t+dt,0.18,ac,ac.destination);
  });
}
function sfxGameOver(){
  // Deep dramatic "thud-whomp" — signals the panel arrival
  const ac=getAC(), t=ac.currentTime;
  // Low resonant boom
  const o1=ac.createOscillator(), g1=ac.createGain();
  o1.type="sine"; o1.frequency.setValueAtTime(120,t); o1.frequency.exponentialRampToValueAtTime(55,t+0.5);

    lfo.connect(lfoG);lfoG.connect(o.frequency);lfo.start(t+0.06);lfo.stop(t+dur);

  ctx.lineTo(botW*s, botY*s);
  ctx.lineTo(-botW*s, botY*s);
  ctx.closePath();

  ctx.strokeStyle="#D4A040";
  ctx.lineWidth=1.5*s;

  ctx.lineWidth=4*s;
  ctx.beginPath();
  ctx.arc(0, (topY-8)*s, 18*s, Math.PI, 0);
  ctx.stroke();
  ctx.strokeStyle="#C07820";
  ctx.lineWidth=2*s;
  ctx.beginPath();
  ctx.arc(0, (topY-8)*s, 18*s, Math.PI, 0);
  ctx.stroke();

}

// ── Circular collision helper ──────────────────────
function circleHitsPipe(p){
  const bx=bird.x, by=bird.y, br=11;
  const capW=PW+10, cx=p.x-5;
  const topBottom = p.topH + p.topSpring;
  const botTop    = p.topH + PGAP + p.botSpring;

  const inCapX  = bx+br > cx    && bx-br < cx+capW;
  const inBodyX = bx+br > p.x   && bx-br < p.x+PW;

  if(inCapX){
    if(by-br < topBottom)  return "top";
    if(by+br > botTop)     return "bot";
  }
  if(inBodyX){
    if(by-br < topBottom-p.capH) return "top";
    if(by+br > botTop+p.capH)    return "bot";
  }
  return null;
};

  topSpring:0,topVel:0,   // top pipe spring

function updateSpring(offset, vel){
  vel    += -0.22 * offset; // restore force
  vel    *= 0.68;           // damping
  offset += vel;
  if(Math.abs(offset)<0.08 && Math.abs(vel)<0.08){ offset=0; vel=0; }
  return [offset, vel];
}

function drawPipe(p){
  // Update springs independently
  [p.topSpring, p.topVel] = updateSpring(p.topSpring, p.topVel);
  [p.botSpring, p.botVel] = updateSpring(p.botSpring, p.botVel);

  const x=p.x*scale, pw=PW*scale, capW=(PW+10)*scale, capH=p.capH*scale;
  const tg=ctx.createLinearGradient(x,0,x+pw,0);
  tg.addColorStop(0,"#3ecf3e");tg.addColorStop(.4,"#5eff5e");tg.addColorStop(1,"#1a8f1a");
  const capX=x-(capW-pw)/2;

  // ── Top pipe — shifted by topSpring ───────────────
  const topH=(p.topH+p.topSpring)*scale;
  ctx.fillStyle=tg;ctx.fillRect(x,0,pw,topH-capH);
  ctx.fillStyle="#2db82d";ctx.fillRect(capX,topH-capH,capW,capH);
  ctx.fillStyle="rgba(255,255,255,.13)";ctx.fillRect(x+5*scale,0,9*scale,topH-capH);ctx.fillRect(capX+5*scale,topH-capH,9*scale,capH);
  ctx.strokeStyle="#145214";ctx.lineWidth=2*scale;ctx.strokeRect(x,0,pw,topH-capH);ctx.strokeRect(capX,topH-capH,capW,capH);

  // ── Bottom pipe — shifted by botSpring ────────────
  const botY=(p.topH+PGAP+p.botSpring)*scale, botH=(H-GH)*scale-botY;
  ctx.fillStyle="#2db82d";ctx.fillRect(capX,botY,capW,capH);
  ctx.fillStyle=tg;ctx.fillRect(x,botY+capH,pw,botH-capH);
  ctx.fillStyle="rgba(255,255,255,.13)";ctx.fillRect(capX+5*scale,botY,9*scale,capH);ctx.fillRect(x+5*scale,botY+capH,9*scale,botH-capH);
  ctx.strokeStyle="#145214";ctx.strokeRect(capX,botY,capW,capH);ctx.strokeRect(x,botY+capH,pw,botH-capH);
}

  ctx.fillStyle=sky;ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="rgba(150,195,225,.45)";
  mts.forEach(m=>{ctx.beginPath();ctx.moveTo((m.x-m.w/2)*scale,(H-GH)*scale);ctx.lineTo(m.x*scale,m.y*scale);ctx.lineTo((m.x+m.w/2)*scale,(H-GH)*scale);ctx.closePath();ctx.fill()});
  clouds.forEach(c=>{
    ctx.save();ctx.globalAlpha=c.a*.9;ctx.fillStyle="#fff";
    const cx=c.x*scale,cy=c.y*scale,cw=c.w*scale,ch=c.w*.4*scale;
    ctx.beginPath();ctx.ellipse(cx,cy,cw/2,ch/2,0,0,Math.PI*2);ctx.fill();
    ctx.ellipse(cx-cw*.25,cy+ch*.15,cw*.35,ch*.55,0,0,Math.PI*2);ctx.fill();
    ctx.ellipse(cx+cw*.25,cy+ch*.15,cw*.35,ch*.55,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
}
function drawGround(){
  const gy=(H-GH)*scale;
  const gg=ctx.createLinearGradient(0,gy,0,gy+18*scale);gg.addColorStop(0,"#4caf50");gg.addColorStop(1,"#388e3c");
  ctx.fillStyle=gg;ctx.fillRect(0,gy,canvas.width,18*scale);
  const dg=ctx.createLinearGradient(0,gy+18*scale,0,canvas.height);dg.addColorStop(0,"#795548");dg.addColorStop(1,"#4e342e");
  ctx.fillStyle=dg;ctx.fillRect(0,gy+18*scale,canvas.width,canvas.height);
  ctx.fillStyle="rgba(255,255,255,.11)";
  const tw=40*scale;
  for(let gx=-tw+(gOff*scale)%tw;gx<canvas.width+tw;gx+=tw){ctx.beginPath();ctx.arc(gx,gy+9*scale,8*scale,0,Math.PI*2);ctx.fill()}
  ctx.strokeStyle="rgba(255,255,255,.28)";ctx.lineWidth=2*scale;
  ctx.beginPath();ctx.moveTo(0,gy+scale);ctx.lineTo(canvas.width,gy+scale);ctx.stroke();
}

// ── Panel helper ──────────────────────────────────
function panel(cx,cy,pw,ph,r){
  const x=(cx-pw/2)*scale,y=(cy-ph/2)*scale,w=pw*scale,h=ph*scale,rv=r*scale;
  ctx.beginPath();ctx.moveTo(x+rv,y);ctx.lineTo(x+w-rv,y);ctx.arcTo(x+w,y,x+w,y+rv,rv);
  ctx.lineTo(x+w,y+h-rv);ctx.arcTo(x+w,y+h,x+w-rv,y+h,rv);
  ctx.lineTo(x+rv,y+h);ctx.arcTo(x,y+h,x,y+h-rv,rv);
  ctx.lineTo(x,y+rv);ctx.arcTo(x,y,x+rv,y,rv);ctx.closePath();
}

// ── Start screen ──────────────────────────────────
function drawStart(){
  ctx.fillStyle="rgba(10,20,40,.28)";ctx.fillRect(0,0,canvas.width,canvas.height);
  panel(W/2,210,220,138,14);ctx.fillStyle="rgba(30,55,100,0.65)";ctx.fill();
  ctx.strokeStyle="rgba(140,180,255,0.35)";ctx.lineWidth=1.5*scale;ctx.stroke();
  ctx.textAlign="center";
  ctx.shadowColor="rgba(0,100,255,0.4)";ctx.shadowBlur=8*scale;
  ctx.fillStyle="rgba(180,220,255,0.9)";ctx.font="bold "+(32*scale)+"px Segoe UI,sans-serif";
  ctx.fillText("FLAPPY",canvas.width/2,(210-22)*scale);
  ctx.fillStyle="#fff";ctx.font="bold "+(34*scale)+"px Segoe UI,sans-serif";
  ctx.fillText("CHICK",canvas.width/2,(210+16)*scale);
  ctx.shadowBlur=0;
  ctx.fillStyle="rgba(180,220,255,0.75)";ctx.font=(13*scale)+"px Segoe UI,sans-serif";
  ctx.fillText("TAP  /  SPACE  to  Start",canvas.width/2,(210+48)*scale);
  if(best>0){ctx.fillStyle="rgba(255,220,120,0.85)";ctx.font="bold "+(12*scale)+"px Segoe UI,sans-serif";ctx.fillText("Best: "+best,canvas.width/2,(210+68)*scale)}
  ctx.fillStyle="rgba(140,200,255,0.8)";ctx.font=(24*scale)+"px sans-serif";
  ctx.fillText("▼",canvas.width/2,(322+Math.sin(fc*.08)*5)*scale);
}

// ── Game Over ─────────────────────────────────────
let gameOverSoundPlayed=false;
function drawDead(){
  // Only start panel animation after bird has flown off the bottom of screen
  if(bird.y > H + 30){
    if(!gameOverSoundPlayed){
      gameOverSoundPlayed=true;
      sfxGameOver();
    }
    goAnim=Math.min(1,goAnim+0.028);
  }
  ctx.fillStyle="rgba(10,20,40,"+(.42*goAnim)+")";ctx.fillRect(0,0,canvas.width,canvas.height);
  const cy=lerp(-200,225,easeOut(goAnim));
  panel(W/2,cy,248,205,14);ctx.fillStyle="rgba(20,45,90,0.65)";ctx.fill();
  ctx.strokeStyle="rgba(140,180,255,0.3)";ctx.lineWidth=1.5*scale;ctx.stroke();
  const scx=canvas.width/2;
  ctx.textAlign="center";
  ctx.shadowColor="rgba(255,60,0,0.55)";ctx.shadowBlur=12*scale;
  ctx.fillStyle="#ff3d1a";ctx.font="bold "+(30*scale)+"px Segoe UI,sans-serif";
  ctx.fillText("GAME OVER",scx,(cy-60)*scale);ctx.shadowBlur=0;
  ctx.strokeStyle="rgba(140,180,255,0.25)";ctx.lineWidth=1.2*scale;
  ctx.beginPath();ctx.moveTo(scx-78*scale,(cy-38)*scale);ctx.lineTo(scx+78*scale,(cy-38)*scale);ctx.stroke();
  ctx.beginPath();ctx.moveTo(scx,(cy-22)*scale);ctx.lineTo(scx,(cy+40)*scale);ctx.stroke();
  ctx.fillStyle="rgba(160,200,255,0.8)";ctx.font=(13*scale)+"px Segoe UI,sans-serif";
  ctx.fillText("SCORE",scx-52*scale,(cy-10)*scale);
  ctx.fillStyle="#fff";ctx.font="bold "+(36*scale)+"px Segoe UI,sans-serif";
  ctx.fillText(score,scx-52*scale,(cy+30)*scale);
  ctx.fillStyle="rgba(255,210,100,0.85)";ctx.font=(13*scale)+"px Segoe UI,sans-serif";
  ctx.fillText("BEST",scx+52*scale,(cy-10)*scale);
  ctx.fillStyle="#ffe87a";ctx.font="bold "+(36*scale)+"px Segoe UI,sans-serif";
  ctx.fillText(best,scx+52*scale,(cy+30)*scale);
  ctx.strokeStyle="rgba(140,180,255,0.18)";ctx.lineWidth=1*scale;
  ctx.beginPath();ctx.moveTo(scx-78*scale,(cy+50)*scale);ctx.lineTo(scx+78*scale,(cy+50)*scale);ctx.stroke();
  ctx.fillStyle="rgba(255,230,120,0.88)";ctx.font=(12*scale)+"px Segoe UI,sans-serif";
  ctx.fillText("eggs laid: "+eggCount,scx,(cy+70)*scale);
  if(score>0&&score===best){ctx.fillStyle="#ffc107";ctx.shadowColor="rgba(255,180,0,.5)";ctx.shadowBlur=6*scale;ctx.font="bold "+(11*scale)+"px Segoe UI,sans-serif";ctx.fillText("NEW BEST!",scx+52*scale,(cy+50)*scale);ctx.shadowBlur=0}
  ctx.globalAlpha=.75+.25*Math.sin(fc*.1);
  ctx.fillStyle="rgba(160,210,255,0.9)";ctx.font="bold "+(14*scale)+"px Segoe UI,sans-serif";
  ctx.fillText("TAP / SPACE to Play Again",scx,(cy+96)*scale);ctx.globalAlpha=1;
}

// ── Kill ──────────────────────────────────────────
function killBird(){
  if(!bird.alive)return;
  bird.alive=false;bird.vy=PHASES[currentPhase].jump*0.35;
  flashA=.85;sx=9;sy=6;deathT=0;state="dead";goAnim=0;gameOverSoundPlayed=false;
  // Haptic feedback on mobile
  if(navigator.vibrate) navigator.vibrate([60,30,80]);
  stopBGMusic();
  sfxDeath();
  spawnFeathers(bird.x,bird.y);spawnParticles(bird.x,bird.y);
  if(score>best){best=score;localStorage.setItem("fc_best",best)}
}

// ── Input ─────────────────────────────────────────
function handleInput(){
  if(state==="start"){
    state="play";bird.reset();pipes=[];score=0;eggCount=0;
    currentPhase=0;prevPhase=0;phaseFlash=0;
    eggs=[];feathers=[];scorePopups=[];lastPT=0;
    sfxStart();
    startBGMusic();
    bird.jump();
  }
  else if(state==="play"){sfxFlap();bird.jump()}
  else if(state==="dead"&&deathT>45){state="start";bird.reset();particles=[];eggs=[];feathers=[]}
}
window.addEventListener("keydown",e=>{if(e.code==="Space"){e.preventDefault();handleInput()}});
canvas.addEventListener("pointerdown",e=>{e.preventDefault();handleInput()});

// ── Main loop ─────────────────────────────────────
function loop(ts){
  requestAnimationFrame(loop);fc++;
  scale=canvas.width/W;sx*=.73;sy*=.73;
  ctx.save();
  if(Math.abs(sx)>.3||Math.abs(sy)>.3)ctx.translate((Math.random()*sx*2-sx)*scale,(Math.random()*sy*2-sy)*scale);

  if(state==="play"){
    prevPhase=currentPhase;
    currentPhase=getPhase(score);
    if(currentPhase>prevPhase)phaseFlash=90;
    const ph=PHASES[currentPhase];
    bird.update();
    clouds.forEach(c=>{c.x-=c.speed;if(c.x+c.w/2<0)c.x=W+c.w/2});
    gOff+=ph.pspeed;if(gOff>40)gOff=0;
    if(!lastPT||ts-lastPT>ph.pint)spawnPipe(ts);
    pipes.forEach(p=>p.x-=ph.pspeed);
    pipes=pipes.filter(p=>p.x>-PW-20);
    pipes.forEach(p=>{
      if(!p.scored&&p.x+PW<bird.x){
        p.scored=true;score++;eggCount++;
        sfxScore();
        if(score>0 && score%10===0) sfxMilestone();
        spawnEgg(bird.x,bird.y);
      }
    });
    updateEggs();updatePopups();
    if(bird.y-20<0){bird.y=20;bird.vy=0}
    if(bird.y+20>H-GH)killBird();
    pipes.forEach(p=>{
      const hit=circleHitsPipe(p);
      if(hit){
        // Only the hit pipe springs — top hit → top pipe moves down, bot hit → bot pipe moves up
        if(hit==="top") p.topVel = 14;   // top pipe bounces down
        else            p.botVel = -14;  // bot pipe bounces up
        killBird();
      }
    });
  }
  if(state==="dead"){deathT++;bird.update();gOff+=PHASES[currentPhase].pspeed*.3;updateParticles();updateFeathers();updateEggs();}
  if(state==="start"){
    bird.y=H/2+Math.sin(fc*.05)*7;bird.angle=Math.sin(fc*.05)*6;bird.updateWing();
    clouds.forEach(c=>{c.x-=c.speed*.5;if(c.x+c.w/2<0)c.x=W+c.w/2});
  }

  drawBG();
  pipes.forEach(drawPipe);
  drawGround();
  eggs.forEach(drawEgg);
  feathers.forEach(drawFeather);
  drawParticles();
  bird.draw();

  if(state==="play"){
    drawBasketHUD();
    drawPhaseNotif();
  }
  if(state==="start")drawStart();
  if(state==="dead")drawDead();
  if(flashA>.01){ctx.fillStyle="rgba(255,120,30,"+flashA+")";ctx.fillRect(0,0,canvas.width,canvas.height);flashA*=.78}
  ctx.restore();
}
requestAnimationFrame(loop);
</script>
